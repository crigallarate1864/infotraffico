<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>INFO TRAFFICO E CHIUSURE STRADALI</title>
    <style>
        /* BASE ISTITUZIONALE */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: grid;
            grid-template-rows: 100px 1fr;
            gap: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* HEADER: TITOLO - OROLOGIO - LOGO */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 3px solid #ffffff;
            padding-bottom: 10px;
        }

        .header-left h1 {
            margin: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .header-center .clock {
            font-size: 4rem;
            font-weight: 900;
            font-family: monospace;
            color: #ffffff;
        }

        .header-right {
            text-align: right;
        }

        .header-right img {
            max-height: 80px;
            width: auto;
        }

        /* CONTENITORE PRINCIPALE */
        .main-container {
            display: grid;
            grid-template-columns: 480px 1fr; /* Colonna fissa a sx, Traffico live a dx */
            gap: 20px;
            height: 100%;
        }

        /* COLONNA SINISTRA: CHIUSURA FISSA GALLARATE */
        .fixed-alert {
            background-color: #cc0000; /* Rosso Soccorso */
            color: white;
            padding: 35px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            border: 2px solid white;
        }

        .fixed-alert h2 {
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            border-bottom: 2px solid white;
            padding-bottom: 10px;
        }

        .alert-body {
            font-size: 2.2rem;
            line-height: 1.25;
            font-weight: bold;
        }

        .highlight {
            color: #ffff00; /* Giallo per date/ore */
        }

        .detour-box {
            margin-top: auto;
            background: white;
            color: black;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }

        .detour-box span { font-size: 1.4rem; display: block; text-transform: uppercase; }
        .detour-box strong { font-size: 3.5rem; font-weight: 900; }

        /* COLONNA DESTRA: AUTOMAP LIVE */
        .live-traffic {
            background-color: #ffffff; /* Sfondo bianco per far leggere bene il sito Automap */
            border-radius: 5px;
            position: relative;
            overflow: hidden; /* Nasconde le barre del sito esterno */
        }

        /* Incorporiamo il sito originale in modo che non possa dare errore di caricamento */
        .live-traffic iframe {
            width: 100%;
            height: 120%; /* Più alto per scorrere oltre l'header del sito */
            border: none;
            position: absolute;
            top: -120px; /* Nasconde la testata di Automap per pulizia */
        }

        /* Overlay di sicurezza se il sito non carica */
        .error-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            background: #111; color: #ff5555; font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1>INFO TRAFFICO E<br>CHIUSURE STRADALI</h1>
        </div>
        <div class="header-center">
            <div id="clock" class="clock">00:00:00</div>
        </div>
        <div class="header-right">
            <img src="logo.png" onerror="this.style.display='none'" alt="LOGO">
        </div>
    </header>

    <div class="main-container">
        
        <div class="fixed-alert">
            <h2>CHIUSURA A8</h2>
            <div class="alert-body">
                A8 GALLARATE<br>ENTRATA CHIUSA<br><br>
                Dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span><br>
                alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span><br><br>
                Direzione: MILANO<br>
                Motivo: Lavori
            </div>
            <div class="detour-box">
                <span>Entrata consigliata:</span>
                <strong>BUSTO ARSIZIO</strong>
            </div>
        </div>

        <div class="live-traffic">
            <iframe 
                src="https://www.automap.it/traffico/a8" 
                id="traffic-frame">
            </iframe>
        </div>

    </div>

    <script>
        // OROLOGIO
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('it-IT', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // REFRESH AUTOMATICO OGNI 10 MINUTI
        // Fondamentale per vedere i nuovi incidenti su Automap
        setInterval(function() {
            document.getElementById('traffic-frame').src = document.getElementById('traffic-frame').src;
        }, 600000);
    </script>
</body>
</html>
