<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO VIABILITÀ | logo.png</title>
    <style>
        :root {
            --bg-main: #020617; 
            --bg-card: rgba(30, 41, 59, 0.7); 
            --border: rgba(51, 65, 85, 0.5);
            --accent: #38bdf8;
            --text-bright: #f8fafc; 
            --text-dim: #94a3b8;
            --danger: #f43f5e; 
            --warning: #fbbf24; 
            --success: #22c55e;
            --header-bg: rgba(15, 23, 42, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main); 
            color: var(--text-bright);
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent);
            padding: 10px 30px;
            z-index: 10;
        }

        .header-center {
            grid-column: 2;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-center h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-bright);
        }

        .header-center .separator { font-size: 2rem; color: var(--accent); font-weight: 300; }
        .header-center img { height: 75px; width: auto; }

        .header-right { 
            grid-column: 3;
            text-align: right; 
        }

        #date-box {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        #clock {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1;
            color: var(--warning);
        }

        main {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .header-permanente { color: var(--danger); border-color: var(--danger); }
        .header-bollettino { color: var(--warning); border-color: var(--warning); }

        .fixed-content { padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        .alert-box { 
            padding: 20px;
            background: rgba(244, 63, 94, 0.1);
            border-radius: 15px;
            border-left: 8px solid var(--danger);
        }

        .alert-box .title { 
            color: var(--danger); 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin-bottom: 10px;
        }

        .alert-box .body-text { font-size: 1.3rem; line-height: 1.4; font-weight: 600; }
        .highlight { color: var(--warning); font-weight: 800; }

        .detour-section { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px dashed var(--accent); 
        }

        .detour-label { font-size: 0.85rem; text-transform: uppercase; color: var(--text-dim); font-weight: 700; }
        .detour-value { font-size: 2.5rem; font-weight: 900; color: var(--accent); }

        .feed-container { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .feed-item { 
            background: rgba(255, 255, 255, 0.03); 
            border-left: 10px solid var(--warning);
            border-radius: 10px;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-title { color: var(--warning); font-weight: 900; font-size: 1.4rem; margin-bottom: 8px; text-transform: uppercase; }
        .item-desc { font-size: 1.2rem; line-height: 1.5; color: var(--text-bright); font-weight: 500; }

        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 1.5rem; font-weight: 800; color: var(--success); text-align: center; padding: 20px;}
    </style>
</head>
<body>

    <header>
        <div></div>
        <div class="header-center">
            <h1>INFO VIABILITÀ</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="" onerror="this.style.display='none'">
        </div>
        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">
                        ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> 
                        alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> 
                        in direzione MILANO.
                    </div>
                </div>

                <div class="detour-section">
                    <div class="detour-label">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">PROVINCIA DI VARESE | A8 | A36 | LEGNANO | SS336</div>
            <div id="feed" class="feed-container">
                <div class="status-msg">SINCRO DATI CCISS...</div>
            </div>
        </div>
    </main>

    <script>
        // IL PONTE: Usa un servizio API che legge l'RSS del CCISS e ce lo passa sbloccato
        const RSS_API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.cciss.it%2Frss';

        // FILTRI NECESSARI: Dato che l'RSS CCISS è nazionale, filtriamo solo le zone che ti interessano
        const keywords = ["varese", "gallarate", "busto arsizio", "legnano", "saronno", "a8", "a36", "ss336", "malpensa", "pedemontana"];

        function updateClock() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', optionsDate);
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); 
        updateClock();

        async function fetchNotizieCCISS() {
            const container = document.getElementById('feed');
            try {
                // Chiamiamo il ponte aggiungendo un parametro per forzare dati freschi
                const response = await fetch(`${RSS_API_URL}&t=${Date.now()}`);
                if (!response.ok) throw new Error("Errore di rete");
                
                const data = await response.json();
                let contentHTML = "";
                let count = 0;

                // Controlla tutte le notizie ricevute dall'RSS
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const title = item.title || "";
                        const desc = item.description || "";
                        const fullText = (title + " " + desc).toLowerCase();

                        // Controlla se il testo contiene almeno una delle parole chiave
                        if (keywords.some(key => fullText.includes(key))) {
                            contentHTML += `
                                <div class="feed-item">
                                    <div class="item-title">${title.toUpperCase()}</div>
                                    <div class="item-desc">${desc}</div>
                                </div>`;
                            count++;
                        }
                    });
                }

                // Se trova notizie le stampa, altrimenti mostra messaggio di sicurezza
                container.innerHTML = count > 0 ? contentHTML : '<div class="status-msg">✅ NESSUNA CRITICITÀ RILEVATA NELLA TUA ZONA</div>';
                
            } catch (e) {
                console.error("Errore di caricamento:", e);
                container.innerHTML = '<div class="status-msg">⚠️ ERRORE RICEZIONE DATI DAL CCISS</div>';
            }
        }

        // Carica subito i dati e aggiorna ogni 60 secondi
        fetchNotizieCCISS();
        setInterval(fetchNotizieCCISS, 60000); 
    </script>
</body>
</html>
