<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MONITORAGGIO VIABILITÀ - PROVINCIA DI VARESE</title>
    <style>
        :root {
            --bg-main: #0a0f18; --bg-card: #161e2e; --border: #2d3748;
            --text-bright: #f8fafc; --text-dim: #94a3b8;
            --danger: #e11d48; --warning: #fbbf24; --success: #4ade80;
            --header-dark: #1e293b; --header-red: #450a0a;
        }
        body.light-mode {
            --bg-main: #f8fafc; --bg-card: #ffffff; --border: #cbd5e1;
            --text-bright: #0f172a; --text-dim: #475569;
            --header-dark: #e2e8f0; --header-red: #fee2e2;
            --warning: #b45309; --success: #15803d;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-main); color: var(--text-bright);
            font-family: 'Inter', sans-serif; margin: 0; padding: 25px;
            height: 100vh; display: grid; grid-template-rows: 120px 1fr; gap: 20px; overflow: hidden;
        }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 3px solid var(--border); padding-bottom: 15px; }
        .header-center { display: flex; align-items: center; gap: 25px; }
        .header-center h1 { font-size: 3.2rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .header-right { justify-self: end; text-align: right; width: 400px; }
        #date-box { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
        #clock { font-size: 4.2rem; font-weight: 900; font-family: monospace; color: var(--warning); line-height: 0.9; }

        main { display: grid; grid-template-columns: 520px 1fr; gap: 25px; height: 100%; padding-bottom: 90px; }
        .panel { background: var(--bg-card); border: 2px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 18px 25px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; }
        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 4px solid var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); border-bottom: 4px solid var(--warning); }

        .fixed-content { padding: 35px; }
        .alert-box { border-left: 12px solid var(--danger); padding-left: 25px; margin-bottom: 50px; }
        .alert-box .title { color: var(--danger); font-size: 2.1rem; font-weight: 900; margin-bottom: 15px; }
        .alert-box .body-text { font-size: 1.6rem; line-height: 1.4; font-weight: 600; }
        .detour-section { background: rgba(0, 0, 0, 0.05); padding: 30px; border-radius: 10px; border: 2px solid var(--border); }
        .detour-value { font-size: 3rem; font-weight: 900; color: var(--warning); }
        .highlight { color: var(--warning); font-weight: 800; }

        .feed-container { padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .feed-item { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 25px; }
        body.light-mode .feed-item { background: #fdfdfd; }
        .item-title { color: var(--warning); font-weight: 900; font-size: 1.7rem; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 8px; }
        .item-desc { font-size: 1.5rem; line-height: 1.5; font-weight: 500; }

        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 2rem; font-weight: 800; color: var(--success); text-align: center; padding: 50px; flex-direction: column; }
    </style>
</head>
<body>
    <header>
        <div></div>
        <div class="header-center">
            <h1>Info Viabilità</h1>
            <span style="font-size:3rem; color:var(--border);">|</span>
            <img src="logo.png" style="max-height:80px;" onerror="this.style.display='none'">
        </div>
        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> in direzione MILANO.</div>
                </div>
                <div class="detour-section">
                    <div style="font-size:1.1rem; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px;">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">
                <span>PROVINCIA DI VARESE | A8 | A36 | LEGNANO</span>
                <span id="sync-status" style="font-size: 0.9rem; opacity: 0.7;">IN ATTESA...</span>
            </div>
            <div id="feed" class="feed-container">
                <div class="status-msg" id="main-msg">CARICAMENTO BOLLETTINO...</div>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv';
        // Usiamo corsproxy.io che è il più stabile
        const PROXY = "https://corsproxy.io/?";

        function updateClock() {
            const now = new Date();
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            document.body.classList.toggle('light-mode', now.getHours() >= 8 && now.getHours() < 18);
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchFromSheets() {
            const container = document.getElementById('feed');
            const syncStatus = document.getElementById('sync-status');
            const mainMsg = document.getElementById('main-msg');
            
            try {
                // Fetch con bypass cache
                const response = await fetch(PROXY + encodeURIComponent(CSV_URL + '&t=' + Date.now()));
                if (!response.ok) throw new Error("Errore Proxy");
                
                const csvData = await response.text();
                
                // Dividiamo le righe
                const lines = csvData.split(/\r?\n/);
                let contentHTML = "";
                let count = 0;

                for (let line of lines) {
                    // Parser super-semplice per non bloccarsi
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 3) {
                        const title = cols[0].replace(/"/g, "").trim();
                        const desc = cols[2] ? cols[2].replace(/"/g, "").trim() : "";
                        
                        // Se la riga contiene un titolo vero e non l'avviso di "Nessuna notizia" dello script
                        if (title.length > 5 && !title.includes("Nessuna criticità")) {
                            contentHTML += `
                                <div class="feed-item">
                                    <div class="item-title">${title.toUpperCase()}</div>
                                    <div class="item-desc">${desc}</div>
                                </div>`;
                            count++;
                        }
                    }
                }

                if (count > 0) {
                    container.innerHTML = contentHTML;
                } else {
                    container.innerHTML = '<div class="status-msg">✅ NESSUNA CRITICITÀ RILEVATA NELLA ZONA</div>';
                }
                syncStatus.textContent = "LIVE - AGGIORNATO: " + new Date().toLocaleTimeString();

            } catch (e) {
                syncStatus.textContent = "ERRORE CONNESSIONE";
                container.innerHTML = `<div class="status-msg" style="color:red;">⚠️ ERRORE DI COLLEGAMENTO<br><small style="font-size:1rem;">Verifica lo stato del Foglio Google</small></div>`;
            }
        }

        fetchFromSheets();
        setInterval(fetchFromSheets, 60000); // Ogni minuto
    </script>
</body>
</html>
