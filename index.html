<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MONITORAGGIO VIABILITÀ - PROVINCIA DI VARESE</title>
    <style>
        :root {
            --bg-main: #0a0f18; --bg-card: #161e2e; --border: #2d3748;
            --text-bright: #f8fafc; --text-dim: #94a3b8;
            --danger: #e11d48; --warning: #fbbf24; --success: #4ade80;
            --header-dark: #1e293b; --header-red: #450a0a;
        }
        body.light-mode {
            --bg-main: #f8fafc; --bg-card: #ffffff; --border: #cbd5e1;
            --text-bright: #0f172a; --text-dim: #475569;
            --header-dark: #e2e8f0; --header-red: #fee2e2;
            --warning: #b45309; --success: #15803d;
        }
        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-main); color: var(--text-bright);
            font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 20px;
            height: 100vh; /* Forza l'altezza alla risoluzione dello schermo */
            display: grid; 
            grid-template-rows: 100px 1fr; /* Header fisso, il resto occupa tutto lo spazio */
            gap: 20px; 
            overflow: hidden; /* Impedisce alla pagina intera di scorrere */
        }

        /* HEADER */
        header {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            border-bottom: 3px solid var(--border); padding-bottom: 10px;
        }
        .header-center { display: flex; align-items: center; gap: 25px; }
        .header-center h1 { font-size: 3rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .header-center .separator { font-size: 3rem; color: var(--border); font-weight: 300; }
        .header-center img { max-height: 70px; width: auto; }

        .header-right { justify-self: end; text-align: right; width: 400px; }
        #date-box { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
        #clock { font-size: 3.8rem; font-weight: 900; font-family: monospace; color: var(--warning); line-height: 0.9; }

        /* LAYOUT PRINCIPALE */
        main { 
            display: grid; 
            grid-template-columns: 500px 1fr; 
            gap: 20px; 
            height: calc(100vh - 160px); /* Calcola l'altezza esatta per stare nel monitor */
            overflow: hidden;
        }

        .panel { 
            background: var(--bg-card); 
            border: 2px solid var(--border); 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            height: 100%; /* I pannelli non devono mai superare l'altezza di main */
            overflow: hidden; 
        }

        .panel-header { 
            padding: 15px 25px; 
            font-size: 1.1rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: flex; 
            justify-content: space-between; 
            flex-shrink: 0; /* Impedisce alla testata di rimpicciolirsi */
        }

        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 4px solid var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); border-bottom: 4px solid var(--warning); }

        /* SINISTRA: FISSO */
        .fixed-content { padding: 30px; overflow-y: auto; }
        .alert-box { border-left: 10px solid var(--danger); padding-left: 20px; margin-bottom: 40px; }
        .alert-box .title { color: var(--danger); font-size: 1.9rem; font-weight: 900; margin-bottom: 10px; }
        .alert-box .body-text { font-size: 1.5rem; line-height: 1.4; font-weight: 600; }
        .detour-section { background: rgba(0, 0, 0, 0.05); padding: 25px; border-radius: 10px; border: 2px solid var(--border); }
        .detour-value { font-size: 2.8rem; font-weight: 900; color: var(--warning); }
        .highlight { color: var(--warning); font-weight: 800; }

        /* DESTRA: FEED SCORREVOLE */
        .feed-container { 
            padding: 20px; 
            overflow-y: scroll; /* Forza lo scroll */
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scrollbar-width: none; /* Nasconde scrollbar su Firefox */
        }
        
        .feed-container::-webkit-scrollbar { display: none; } /* Nasconde scrollbar su Chrome/Edge */

        .feed-item { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            flex-shrink: 0; /* Evita che gli item vengano schiacciati */
        }
        
        body.light-mode .feed-item { background: #fdfdfd; }
        
        .item-title { 
            color: var(--warning); 
            font-weight: 900; 
            font-size: 1.5rem; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            border-bottom: 1px solid rgba(128,128,128,0.2); 
            padding-bottom: 5px; 
        }
        .item-desc { font-size: 1.4rem; line-height: 1.4; font-weight: 500; }

        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 2rem; font-weight: 800; color: var(--success); text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="header-left"></div>
        <div class="header-center">
            <h1>Info Viabilità</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="" onerror="this.style.display='none'">
        </div>
        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> in direzione MILANO.</div>
                </div>
                <div class="detour-section">
                    <div style="font-size:1rem; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px;">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">
                <span>PROVINCIA DI VARESE | A8 | A36 | LEGNANO</span>
                <span id="sync-status" style="font-size: 0.8rem; opacity: 0.7;">IN ATTESA...</span>
            </div>
            <div id="feed" class="feed-container">
                <div class="status-msg" id="main-status">CARICAMENTO BOLLETTINO...</div>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?gid=0&single=true&output=csv';
        const PROXY = "https://api.allorigins.win/raw?url=";

        function updateClock() {
            const now = new Date();
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            document.body.classList.toggle('light-mode', now.getHours() >= 8 && now.getHours() < 18);
        }
        setInterval(updateClock, 1000); updateClock();

        function parseCSV(text) {
            const rows = []; let row = []; let col = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else if (char !== '\r') { col += char; }
            }
            if (row.length > 0 || col !== "") { row.push(col); rows.push(row); }
            return rows;
        }

        async function fetchFromSheets() {
            const container = document.getElementById('feed');
            const syncStatus = document.getElementById('sync-status');
            
            try {
                const finalUrl = PROXY + encodeURIComponent(CSV_URL + '&t=' + Date.now());
                const response = await fetch(finalUrl);
                if (!response.ok) throw new Error("Errore Proxy");
                const csvData = await response.text();
                const rows = parseCSV(csvData);
                
                let contentHTML = "";
                let count = 0;

                rows.forEach(cols => {
                    if (cols.length >= 3) {
                        const title = cols[0].trim();
                        const desc = cols[2] ? cols[2].trim() : "";
                        if (title.length > 5 && !title.toLowerCase().includes("nessuna criticità")) {
                            contentHTML += `
                                <div class="feed-item">
                                    <div class="item-title">${title.toUpperCase()}</div>
                                    <div class="item-desc">${desc}</div>
                                </div>`;
                            count++;
                        }
                    }
                });

                container.innerHTML = count > 0 ? contentHTML : '<div class="status-msg">✅ NESSUNA CRITICITÀ RILEVATA</div>';
                syncStatus.textContent = "LIVE - AGGIORNATO: " + new Date().toLocaleTimeString();
                
                // Reset scroll quando si aggiornano i dati
                container.scrollTop = 0;

            } catch (e) {
                syncStatus.textContent = "ERRORE CONNESSIONE";
            }
        }

        // --- FUNZIONE AUTO-SCROLL ---
        function startAutoScroll() {
            const container = document.getElementById('feed');
            let scrollSpeed = 1; // Velocità di scorrimento (pixel)
            
            setInterval(() => {
                if (container.scrollHeight > container.clientHeight) {
                    container.scrollTop += scrollSpeed;
                    
                    // Se arriva alla fine, torna all'inizio con una piccola pausa
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 1) {
                        setTimeout(() => { container.scrollTop = 0; }, 3000); 
                    }
                }
            }, 50); // Fluidità dello scroll
        }

        fetchFromSheets();
        setInterval(fetchFromSheets, 60000);
        startAutoScroll(); // Attiva lo scorrimento automatico
    </script>
</body>
</html>
