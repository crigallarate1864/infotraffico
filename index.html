<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MONITORAGGIO VIABILITÀ - COMPACT</title>
    <style>
        :root {
            /* TEMA DARK */
            --bg-main: #0a0f18; 
            --bg-card: #161e2e; 
            --border: #2d3748;
            --text-bright: #f8fafc; 
            --text-dim: #94a3b8;
            --danger: #e11d48; 
            --warning: #fbbf24; 
            --success: #4ade80;
            --header-dark: #1e293b; 
            --header-red: #450a0a;
        }

        body.light-mode {
            /* TEMA LIGHT */
            --bg-main: #f8fafc; 
            --bg-card: #ffffff; 
            --border: #cbd5e1;
            --text-bright: #0f172a; 
            --text-dim: #475569;
            --header-dark: #e2e8f0; 
            --header-red: #fee2e2;
            --warning: #b45309; 
            --success: #15803d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main); 
            color: var(--text-bright);
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; 
            display: grid; 
            grid-template-rows: auto 1fr; 
            overflow: hidden;
            transition: background 0.4s;
            position: relative; /* Per posizionare il logo */
        }

        /* HEADER PROFESSIONALE */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding: 10px 20px;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-center h1 {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .header-center .separator { 
            font-size: 2rem; 
            color: var(--border); 
            font-weight: 200; 
        }

        .header-center img { 
            max-height: 50px; 
            width: auto; 
        }

        /* DATA E OROLOGIO A DESTRA */
        .header-right {
            justify-self: end;
            text-align: right;
        }

        #date-box {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            line-height: 1;
        }

        #clock {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: monospace;
            color: var(--warning);
            line-height: 1;
        }

        /* CORPO DASHBOARD */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 15px;
            padding: 15px;
            height: 100%;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-permanente { background: var(--header-red); color: var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); }

        /* SINISTRA: SEGNALAZIONE PERMANENTE */
        .fixed-content { padding: 20px; flex-grow: 1; }
        
        .alert-box { 
            border-left: 6px solid var(--danger); 
            padding-left: 15px; 
            margin-bottom: 30px; 
        }

        .alert-box .title { 
            color: var(--danger); 
            font-size: 1.5rem; 
            font-weight: 800; 
            margin-bottom: 8px; 
        }

        .alert-box .body-text { 
            font-size: 1.1rem; 
            line-height: 1.3; 
            font-weight: 600; 
        }

        .highlight { color: var(--warning); font-weight: 700; }

        .detour-section { 
            background: rgba(0, 0, 0, 0.05); 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
        }

        .detour-label { 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            color: var(--text-dim); 
            font-weight: 700; 
        }

        .detour-value { 
            font-size: 2rem; 
            font-weight: 800; 
            color: var(--warning); 
            line-height: 1; 
        }

        /* DESTRA: NOTIZIE CCISS - COMPATTE */
        .feed-container { 
            padding: 10px; 
            overflow-y: scroll; /* Forza lo scroll */
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin; /* Nasconde scrollbar su Firefox */
        }

        /* Nasconde scrollbar su Chrome/Edge */
        .feed-container::-webkit-scrollbar { width: 6px; }
        .feed-container::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 3px; }

        .feed-item { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 15px;
            flex-shrink: 0; /* Evita che gli item vengano schiacciati */
        }

        body.light-mode .feed-item { background: #fdfdfd; }

        .item-title { 
            color: var(--warning); 
            font-weight: 800; 
            font-size: 1.1rem; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
        }

        .item-desc { 
            font-size: 1rem; 
            line-height: 1.3; 
            color: var(--text-bright); 
            font-weight: 500;
        }

        .status-msg { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100%; 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--success); 
            text-align: center; 
        }

        /* LOGO CCISS IN BASSO A DESTRA */
        .footer-logo { 
            position: fixed; 
            bottom: 10px; 
            right: 15px; 
            z-index: 100; 
        }

        .footer-logo img { 
            max-height: 40px; 
            width: auto; 
            opacity: 0.8; 
        }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="header-left"></div>
        
        <div class="header-center">
            <h1>Info Viabilità</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="Sede" onerror="this.style.visibility='hidden'">
        </div>

        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">
                        ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> 
                        alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> 
                        in direzione MILANO.
                    </div>
                </div>

                <div class="detour-section">
                    <div class="detour-label">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">PROVINCIA DI VARESE | A8 | A36 | LEGNANO</div>
            <div id="feed" class="feed-container">
                <div class="status-msg">CONTROLLO IN CORSO...</div>
            </div>
        </div>
    </main>

    <div class="footer-logo">
        <img src="logo CCISS.png" alt="CCISS" onerror="this.style.visibility='hidden'">
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv';
        const PROXY = "https://corsproxy.io/?";

        // Filtri per Provincia di Varese, A8, A36 e Legnano
        const keywords = [
            "varese", "gallarate", "busto arsizio", "legnano", "saronno", 
            "tradate", "somma lombardo", "caronno pertusella", "cassano magnago", 
            "a8", "milano-laghi", "a36", "pedemontana"
        ];

        function updateClock() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', optionsDate);
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            
            // Switch automatico Giorno/Notte (08:00 - 18:00)
            const hour = now.getHours();
            document.body.classList.toggle('light-mode', hour >= 8 && hour < 18);
        }
        setInterval(updateClock, 1000); 
        updateClock();

        // Parser CSV robusto per gestire ritorni a capo e virgolette
        function parseCSV(text) {
            const rows = []; let row = []; let col = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i]; let nextChar = text[i+1];
                if (char === '"' && inQuotes && nextChar === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else if (char === '\r' && !inQuotes) { }
                else { col += char; }
            }
            if (row.length > 0 || col !== "") { row.push(col); rows.push(row); }
            return rows;
        }

        async function fetchFromSheets() {
            const container = document.getElementById('feed');
            
            try {
                // Aggiungiamo timestamp per saltare la cache del browser
                const response = await fetch(PROXY + encodeURIComponent(CSV_URL + '&t=' + Date.now()));
                if (!response.ok) throw new Error("Network error");
                
                const csvData = await response.text();
                const rows = parseCSV(csvData);
                let contentHTML = "";
                let count = 0;

                rows.forEach(cols => {
                    if (cols.length >= 3) {
                        const title = cols[0].trim();
                        const desc = cols[2].trim();
                        const fullText = (title + " " + desc).toLowerCase();

                        // Controllo se il testo contiene una delle parole chiave
                        const matches = keywords.some(key => fullText.includes(key));

                        if (matches && title.length > 2) {
                            contentHTML += `
                                <div class="feed-item">
                                    <div class="item-title">${title.toUpperCase()}</div>
                                    <div class="item-desc">${desc}</div>
                                </div>`;
                            count++;
                        }
                    }
                });

                if (count > 0) {
                    container.innerHTML = contentHTML;
                } else {
                    container.innerHTML = '<div class="status-msg">✅ NESSUNA NOTIZIA RILEVATA</div>';
                }

            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="status-msg">⚠️ ERRORE CONNESSIONE DATI</div>';
            }
        }

        // Caricamento iniziale e refresh ogni 60 secondi
        fetchFromSheets();
        setInterval(fetchFromSheets, 60000);
    </script>
</body>
</html>
