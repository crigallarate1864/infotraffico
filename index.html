<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>INFO VIABILITÀ - SEDE</title>
    <style>
        /* VARIABILI COLORE - TEMA DARK (Default) */
        :root {
            --bg-main: #0a0f18;
            --bg-card: #161e2e;
            --border: #2d3748;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #e11d48;
            --warning: #fbbf24;
            --success: #4ade80;
            --header-gray: #1e293b;
            --header-red: #450a0a;
        }

        /* TEMA LIGHT (08:00 - 18:00) */
        body.light-mode {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --border: #cbd5e1;
            --text-main: #0f172a;
            --text-dim: #475569;
            --header-gray: #e2e8f0;
            --header-red: #fee2e2;
        }

        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* HEADER */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        header h1 { font-size: 1.4rem; text-transform: uppercase; margin: 0; color: var(--text-dim); letter-spacing: 1px; }
        
        .clock {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: var(--text-main);
        }

        .logo-top-right { text-align: right; }
        .logo-top-right img { max-height: 70px; width: auto; }

        /* GRID PRINCIPALE */
        main {
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 25px;
            flex-grow: 1;
            min-height: 0;
            padding-bottom: 50px;
        }

        .panel {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 2px solid var(--danger); }
        .header-bollettino { background: var(--header-gray); color: var(--warning); border-bottom: 2px solid var(--warning); }

        /* SINISTRA: FISSO */
        .fixed-content { padding: 30px; border-left: 10px solid var(--danger); }
        .fixed-content .title { font-size: 1.6rem; font-weight: 800; color: var(--danger); margin-bottom: 20px; }
        .fixed-content .text { font-size: 1.3rem; line-height: 1.5; font-weight: 600; }
        .highlight { color: var(--warning); }

        .detour-box {
            margin-top: auto;
            background: rgba(0,0,0,0.1);
            padding: 25px;
            border-top: 1px solid var(--border);
        }
        .detour-box span { font-size: 0.9rem; text-transform: uppercase; color: var(--text-dim); }
        .detour-box div { font-size: 2.5rem; font-weight: 900; color: var(--warning); margin-top: 5px; }

        /* DESTRA: FEED */
        .feed-container { padding: 0 25px; overflow-y: auto; flex-grow: 1; }
        .feed-item { padding: 20px 0; border-bottom: 1px solid var(--border); }
        .feed-item:last-child { border-bottom: none; }
        .item-title { color: var(--warning); font-weight: 700; font-size: 1.2rem; margin-bottom: 5px; }
        .item-desc { font-size: 1.1rem; line-height: 1.4; color: var(--text-main); }

        /* STATUS MESSAGE */
        .status-msg {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 40px;
            color: var(--success);
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
        }

        /* LOGO CCISS BASSO */
        .logo-footer {
            position: absolute;
            bottom: 20px;
            right: 25px;
        }
        .logo-footer img { max-height: 55px; width: auto; opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <h1>Info Viabilità</h1>
        <div id="clock" class="clock">00:00:00</div>
        <div class="logo-top-right">
            <img src="logo.png" alt="" onerror="this.style.display='none'">
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="title">A8 GALLARATE - ENTRATA CHIUSA</div>
                <div class="text">
                    Entrata chiusa dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> 
                    alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> 
                    in direzione Milano per lavori.
                </div>
            </div>
            <div class="detour-box">
                <span>Entrata consigliata verso Milano</span>
                <div>Busto Arsizio</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">
                <span>Bollettino CCISS</span>
                <span id="update-status" style="font-size: 0.8rem; font-weight: normal; opacity: 0.7;">Inizializzazione...</span>
            </div>
            <div id="feed" class="feed-container">
                <div class="status-msg">Caricamento bollettino...</div>
            </div>
        </div>
    </main>

    <div class="logo-footer">
        <img src="logo CCISS.png" alt="" onerror="this.style.display='none'">
    </div>

    <script>
        // TEMA GIORNO/NOTTE
        function updateTheme() {
            const h = new Date().getHours();
            const isDay = h >= 8 && h < 18;
            document.body.classList.toggle('light-mode', isDay);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            updateTheme();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // RECUPERO RSS CCISS
        const keywords = ["Varese", "A8", "Gallarate", "Busto", "Castellanza", "Saronno", "A36", "Pedemontana", "Malpensa", "Lainate", "Vergiate"];

        async function fetchCCISS() {
            const container = document.getElementById('feed');
            const status = document.getElementById('update-status');
            
            // Carichiamo 50 notizie per essere sicuri di non saltare nulla
            const rssUrl = "https://www.cciss.it/rss";
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=50&t=${Date.now()}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    container.innerHTML = "";
                    let found = 0;

                    data.items.forEach(item => {
                        const fullText = (item.title + " " + item.description).toLowerCase();
                        
                        // Filtro: Se contiene una keyword, mostra
                        const match = keywords.some(k => fullText.includes(k.toLowerCase()));

                        if (match) {
                            const div = document.createElement('div');
                            div.className = 'feed-item';
                            div.innerHTML = `
                                <div
