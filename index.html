<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>INFO TRAFFICO E CHIUSURE STRADALI</title>
    <style>
        /* STILE ISTITUZIONALE E PULITO */
        body {
            background-color: #0c1219; /* Blu notte molto scuro */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 30px;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 30px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid #ffcc00;
            padding-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #ffcc00;
        }

        .clock {
            font-size: 4.5rem;
            font-weight: 700;
            color: #ffffff;
        }

        /* GRIGLIA CONTENUTI */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            height: 100%;
        }

        /* BLOCCO CHIUSURA FISSA (SINISTRA) */
        .fixed-alert {
            background-color: #2b0000;
            border: 10px solid #ff0000;
            border-radius: 8px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .label-red {
            background: #ff0000;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            font-size: 1.8rem;
            align-self: flex-start;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .alert-title {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 40px;
        }

        .alert-details {
            font-size: 2.5rem;
            line-height: 1.4;
            color: #ffffff;
        }

        .highlight-yellow {
            color: #ffcc00;
            font-weight: bold;
        }

        .detour-box {
            margin-top: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 4px;
            text-align: center;
        }

        /* BLOCCO LIVE FEED (DESTRA) */
        .live-feed {
            background-color: #161e27;
            border-radius: 8px;
            padding: 30px;
            border: 1px solid #303f4f;
            display: flex;
            flex-direction: column;
        }

        .feed-header {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 25px;
            color: #8da2b5;
            display: flex;
            justify-content: space-between;
        }

        .feed-container {
            overflow-y: auto;
            flex-grow: 1;
        }

        .event-item {
            border-bottom: 1px solid #303f4f;
            padding: 25px 0;
        }

        .event-item:last-child { border-bottom: none; }

        .event-title {
            font-size: 1.8rem;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .event-desc {
            font-size: 1.6rem;
            line-height: 1.3;
            color: #cbd5e0;
        }

        .status-ok {
            font-size: 2rem;
            color: #48bb78;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Info traffico e chiusure stradali</h1>
        <div id="clock" class="clock">00:00:00</div>
    </header>

    <div class="main-container">
        <section class="fixed-alert">
            <div class="label-red">CHIUSURA PROLUNGATA</div>
            <div class="alert-title">A8 GALLARATE<br>ENTRATA CHIUSA</div>
            <div class="alert-details">
                Dal: <span class="highlight-yellow">23/02/2026 (21:00)</span><br>
                Al: <span class="highlight-yellow">24/06/2026 (05:00)</span><br><br>
                Direzione: <span style="text-decoration: underline;">MILANO</span><br>
                Causa: Lavori in corso
            </div>
            <div class="detour-box">
                <span style="font-size: 1.8rem; display: block; margin-bottom: 10px;">ENTRATA CONSIGLIATA:</span>
                <span style="font-size: 4rem; font-weight: 900; color: #ffcc00;">BUSTO ARSIZIO</span>
            </div>
        </section>

        <section class="live-feed">
            <div class="feed-header">
                <span>RETE LOCALE (A8 / A36)</span>
                <span id="update-status" style="font-size: 1.2rem; font-weight: normal;">In aggiornamento...</span>
            </div>
            <div id="feed-container" class="feed-container">
                </div>
        </section>
    </div>

    <script>
        // OROLOGIO
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // RECUPERO DATI
        const keywords = ["Varese", "A8", "Gallarate", "Busto", "Castellanza", "Legnano", "Saronno", "A36", "Pedemontana", "Lainate", "Malpensa", "Besnate", "Vergiate"];

        async function fetchTraffic() {
            const container = document.getElementById('feed-container');
            const status = document.getElementById('update-status');
            
            // Utilizzo di un proxy più moderno per bypassare il blocco CORS di Autostrade
            const rssUrl = "https://www.autostrade.it/autostrade-gis/rss.do?tronco=A8";
            const apiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                container.innerHTML = "";
                let count = 0;

                items.forEach(item => {
                    const title = item.querySelector("title").textContent;
                    const desc = item.querySelector("description").textContent;
                    const fullText = (title + " " + desc).toLowerCase();

                    // Filtro per Provincia di Varese
                    if (keywords.some(k => fullText.includes(k.toLowerCase())) && count < 6) {
                        const div = document.createElement('div');
                        div.className = 'event-item';
                        div.innerHTML = `<span class="event-title">${title.toUpperCase()}</span><div class="event-desc">${desc}</div>`;
                        container.appendChild(div);
                        count++;
                    }
                });

                if (count === 0) {
                    container.innerHTML = '<div class="status-ok">✔ NESSUNA CRITICITÀ SEGNALATA SU A8 / A36</div>';
                }
                
                const d = new Date();
                status.textContent = "Ultimo agg: " + d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');

            } catch (error) {
                console.error(error);
                status.textContent = "Errore connessione";
                if(container.innerHTML === "") {
                    container.innerHTML = '<div class="event-item" style="color: #ff5555;">Impossibile caricare dati automatici. Controllare connessione internet.</div>';
                }
            }
        }

        // Avvio e refresh ogni 5 minuti
        fetchTraffic();
        setInterval(fetchTraffic, 300000);
    </script>
</body>
</html>
