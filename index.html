<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    >

    <title>INFO VIABILITÀ</title>

    <style>
        :root {
            --bg-main: #020617;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border: rgba(51, 65, 85, 0.5);
            --accent: #38bdf8;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --warning: #fbbf24;
            --success: #22c55e;
            --header-bg: rgba(15, 23, 42, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background: var(--bg-main);
            color: var(--text-bright);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            flex-shrink: 0;
            background: var(--header-bg);
            border-bottom: 2px solid var(--accent);
            padding: 10px 30px;
        }

        .header-center {
            grid-column: 2;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-center h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .separator {
            font-size: 2rem;
            color: var(--accent);
        }

        .header-center img {
            display: block;
            height: 75px;
            max-width: 170px;
            object-fit: contain;
        }

        .header-right {
            grid-column: 3;
            text-align: right;
        }

        #date-box {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        #clock {
            font-size: 3.8rem;
            line-height: 1;
            font-weight: 900;
            color: var(--warning);
            font-variant-numeric: tabular-nums;
        }

        main {
            min-height: 0;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            min-height: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            flex-shrink: 0;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .header-permanente {
            color: var(--danger);
        }

        .header-bollettino {
            color: var(--warning);
        }

        .fixed-content {
            min-height: 0;
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            gap: 20px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .fixed-content::-webkit-scrollbar {
            display: none;
        }

        .alert-box {
            flex-shrink: 0;
            padding: 20px;
            background: rgba(244, 63, 94, 0.1);
            border-radius: 15px;
            border-left: 8px solid var(--danger);
        }

        .alert-box .title {
            color: var(--danger);
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .alert-box .body-text {
            font-size: 1.3rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .highlight {
            color: var(--warning);
            font-weight: 800;
        }

        .feed-container {
            min-height: 0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .feed-item {
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.03);
            border-left: 10px solid var(--warning);
            border-radius: 10px;
            padding: 20px;
        }

        .item-title {
            color: var(--warning);
            font-weight: 900;
            font-size: 1.4rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .item-desc {
            font-size: 1.2rem;
            line-height: 1.5;
            font-weight: 500;
            overflow-wrap: anywhere;
        }

        .status-msg {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            flex-grow: 1;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
            text-align: center;
            padding: 20px;
        }

        .status-msg.error {
            color: var(--danger);
        }

        @media (max-width: 900px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }

            header {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 15px;
                padding: 20px 15px;
            }

            .header-center {
                grid-column: 1;
                justify-content: center;
                flex-direction: column-reverse;
                gap: 10px;
            }

            .separator {
                display: none;
            }

            .header-right {
                grid-column: 1;
                text-align: center;
            }

            .header-center h1 {
                font-size: 1.8rem;
            }

            #clock {
                font-size: 3rem;
            }

            main {
                grid-template-columns: 1fr;
                height: auto;
                overflow: visible;
                padding: 10px;
            }

            .panel {
                margin-bottom: 20px;
            }

            .alert-box .title {
                font-size: 1.6rem;
            }

            .alert-box .body-text {
                font-size: 1.1rem;
            }

            .feed-container,
            .fixed-content {
                max-height: 500px;
            }

            .item-title {
                font-size: 1.2rem;
            }

            .item-desc {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function delay(milliseconds) {

                lastDateKey = dateKey;

                        month: "long",
                        year: "numeric"
                    });
            }

            document.getElementById("clock").textContent =
                now.toLocaleTimeString("it-IT", {
                    hour: "2-digit",
                    minute: "2-digit"
                });
        }

        function updatePermanentAlerts() {
            const container = document.getElementById("permanent-feed");
            const now = new Date();

            const activeAlerts = programmedAlerts.filter(function(alert) {
                return now >= alert.start && now <= alert.end;
            });

            const signature = activeAlerts.length > 0
                ? activeAlerts.map(function(alert) {
                    return [
                        alert.title,
                        alert.start.getTime(),
                        alert.end.getTime()
                    ].join("-");
                }).join("|")
                : "nessun-avviso";

            if (signature === lastPermanentSignature) {
                return;
            }

            lastPermanentSignature = signature;
            container.scrollTop = 0;

            if (activeAlerts.length === 0) {
                container.style.justifyContent = "center";

                container.innerHTML =

                    '✅ NESSUNA CHIUSURA PROGRAMMATA OGGI' +

                return;

            container.innerHTML = activeAlerts.map(function(alert) {

                );
            }).join("");

            resetScrollState("permanent-feed");
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let field = "";
            let insideQuotes = false;

            for (let index = 0; index < text.length; index++) {
                const character = text[index];
                const nextCharacter = text[index + 1];

                if (character === '"') {
                    if (insideQuotes && nextCharacter === '"') {
                        field += '"';
                        index++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }

                    continue;
                }

                if (character === "," && !insideQuotes) {
                    row.push(field);
                    field = "";
                    continue;
                }

                if (
                    (character === "\n" || character === "\r") &&
                    !insideQuotes
                ) {
                    if (character === "\r" && nextCharacter === "\n") {
                        index++;
                    }

                    row.push(field);
                    rows.push(row);

                    row = [];
                    field = "";
                    continue;
                }

                field += character;
            }

            if (field.length > 0 || row.length > 0) {
                row.push(field);
                rows.push(row);
            }

            return rows;
        }

        async function requestCSV() {
            const controller = new AbortController();

            const timeoutId = window.setTimeout(function() {
                controller.abort();
            }, FETCH_TIMEOUT);

            try {
                const separator = CSV_URL.indexOf("?") !== -1 ? "&" : "?";

                const requestUrl =
                    CSV_URL +
                    separator +
                    "cache=" +
                    Date.now();

                const response = await fetch(requestUrl, {
                    method: "GET",
                    cache: "no-store",
                    credentials: "omit",
                    redirect: "follow",
                    signal: controller.signal
                });

                if (!response.ok) {
                    throw new Error(
                        "Errore HTTP " + response.status
                    );
                }

                const text = await response.text();

                if (!text || text.trim() === "") {
                    throw new Error("Il CSV ricevuto è vuoto");
                }

                const initialContent = text
                    .trim()
                    .slice(0, 100)
                    .toLowerCase();

                if (
                    initialContent.indexOf("<!doctype html") !== -1 ||
                    initialContent.indexOf("<html") !== -1
                ) {
                    throw new Error(
                        "Google ha restituito una pagina HTML invece del CSV"
                    );
                }

                return text;

            } finally {
                window.clearTimeout(timeoutId);
            }
        }

        async function downloadCSVWithRetry() {
            let lastError = null;

            for (
                let attempt = 1;
                attempt <= MAX_FETCH_ATTEMPTS;
                attempt++
            ) {
                try {
                    return await requestCSV();

                } catch (error) {
                    lastError = error;

                    console.warn(
                        "Tentativo CSV " +
                        attempt +
                        " non riuscito:",
                        error
                    );

                    if (attempt < MAX_FETCH_ATTEMPTS) {
                        await delay(attempt * 1500);
                    }
                }
            }

            throw lastError;
        }

        function renderCSV(text) {
            const container = document.getElementById("feed");

            if (text === lastCsvContent) {
                return;
            }

            const rows = parseCSV(text);
            const items = [];

            rows.forEach(function(columns) {
                const colA = columns[0]
                    ? columns[0].trim()
                    : "";

                const colC = columns[2]
                    ? columns[2].trim()
                    : "";

                if (colA !== "" && colC !== "") {
                    items.push(
                        '<div class="feed-item">' +
                            '<div class="item-title">' +
                                escapeHtml(colA) +
                            '</div>' +
                            '<div class="item-desc">' +
                                escapeHtml(colC) +
                            '</div>' +
                        '</div>'
                    );
                }
            });

            container.scrollTop = 0;

            if (items.length > 0) {
                container.innerHTML = items.join("");
            } else {
                container.innerHTML =
                    '<div class="status-msg">' +
                    '✅ NESSUNA SEGNALAZIONE IN CORSO' +
                    '</div>';
            }

            lastCsvContent = text;
            csvLoadedSuccessfully = true;

            resetScrollState("feed");
        }

        function showCSVError(error) {
            console.error("Errore lettura CSV:", error);

            /*
             * Se erano già stati caricati dati corretti,
             * non vengono cancellati per un errore temporaneo.
             */
            if (csvLoadedSuccessfully) {
                return;
            }

            const container = document.getElementById("feed");

            container.innerHTML =

                '⚠️ ERRORE LETTURA DATI<br>' +
                'NUOVO TENTATIVO AUTOMATICO' +

        }

        async function fetchCSV() {
            if (csvFetchInProgress) {
                return;
            }

            csvFetchInProgress = true;

            try {
                const csvText = await downloadCSVWithRetry();
                renderCSV(csvText);

            } catch (error) {
                showCSVError(error);

            } finally {
                csvFetchInProgress = false;
            }
        }

        function resetScrollState(elementId) {
            const state = scrollStates[elementId];

            if (!state) {
                return;
            }

            state.pausedUntil =
                Date.now() + AUTO_SCROLL_PAUSE;
        }

        function autoScroll(elementId) {
            if (document.hidden) {
                return;
            }

            const element = document.getElementById(elementId);
            const state = scrollStates[elementId];

            if (!element || !state) {
                return;
            }

            if (element.scrollHeight <= element.clientHeight + 2) {
                element.scrollTop = 0;
                return;
            }

            const now = Date.now();

            if (now < state.pausedUntil) {
                return;
            }

            const reachedBottom =
                Math.ceil(element.scrollTop) +
                element.clientHeight >=
                element.scrollHeight - 1;

            if (reachedBottom) {
                element.scrollTop = 0;
                state.pausedUntil = now + AUTO_SCROLL_PAUSE;
                return;
            }

            element.scrollTop += AUTO_SCROLL_STEP;
        }

        function initializePage() {
            updateClock();
            updatePermanentAlerts();
            fetchCSV();

            window.setInterval(
                updateClock,
                1000
            );

            window.setInterval(
                updatePermanentAlerts,
                ALERT_REFRESH_INTERVAL
            );

            window.setInterval(
                fetchCSV,
                CSV_REFRESH_INTERVAL
            );

            window.setInterval(function() {
                autoScroll("feed");
                autoScroll("permanent-feed");
            }, AUTO_SCROLL_INTERVAL);
        }

        window.addEventListener("online", function() {
            fetchCSV();
        });

        document.addEventListener("visibilitychange", function() {
            if (!document.hidden) {
                updateClock();
                updatePermanentAlerts();
                fetchCSV();
            }
        });

        window.addEventListener("pageshow", function() {
            updateClock();
            updatePermanentAlerts();
        });

        initializePage();
    </script>

</body>
</html>
