<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFO VIABILITÀ</title>

<style>

:root{
--bg-main:#020617;
--bg-card:rgba(30,41,59,0.75);
--border:rgba(51,65,85,0.5);
--accent:#38bdf8;
--text-bright:#f8fafc;
--text-dim:#94a3b8;
--danger:#f43f5e;
--warning:#fbbf24;
--success:#22c55e;
--header-bg:rgba(15,23,42,0.9);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:var(--bg-main);
color:var(--text-bright);
font-family:system-ui,-apple-system,sans-serif;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
background:var(--header-bg);
border-bottom:2px solid var(--accent);
padding:12px 30px;
}

.header-center{
grid-column:2;
display:flex;
align-items:center;
gap:16px;
}

.header-center h1{
font-size:2.6rem;
font-weight:900;
letter-spacing:2px;
}

.separator{
font-size:2rem;
color:var(--accent);
}

.header-center img{
height:75px;
}

.header-right{
grid-column:3;
text-align:right;
}

#date-box{
font-size:1rem;
font-weight:700;
text-transform:uppercase;
color:var(--text-dim);
}

#clock{
font-size:3.8rem;
font-weight:900;
color:var(--warning);
}

main{
display:grid;
grid-template-columns:450px 1fr;
gap:22px;
padding:22px;
flex-grow:1;
overflow:hidden;
}

.panel{
background:var(--bg-card);
border:1px solid var(--border);
border-radius:18px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.panel-header{
padding:16px 22px;
font-size:1.1rem;
font-weight:900;
text-transform:uppercase;
border-bottom:2px solid var(--border);
background:rgba(0,0,0,0.25);
}

.header-permanente{
color:var(--danger);
}

.header-bollettino{
color:var(--warning);
}

.fixed-content{
padding:25px;
display:flex;
flex-direction:column;
gap:20px;
}

.alert-box{
padding:20px;
background:rgba(244,63,94,0.12);
border-radius:14px;
border-left:8px solid var(--danger);
}

.alert-box .title{
color:var(--danger);
font-size:2.2rem;
font-weight:900;
margin-bottom:10px;
}

.alert-box .body-text{
font-size:1.3rem;
line-height:1.4;
font-weight:600;
}

.highlight{
color:var(--warning);
font-weight:800;
}

.detour-section{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:14px;
border:1px dashed var(--accent);
}

.detour-label{
font-size:0.85rem;
text-transform:uppercase;
color:var(--text-dim);
font-weight:700;
}

.detour-value{
font-size:2.5rem;
font-weight:900;
color:var(--accent);
}

.feed-container{
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.feed-item{
background:rgba(255,255,255,0.05);
border-left:12px solid var(--warning);
border-radius:12px;
padding:22px 24px;
box-shadow:0 4px 18px rgba(0,0,0,0.4);
animation:fadeIn 0.5s ease;
}

.feed-item.tomtom{
border-left:12px solid var(--accent);
}

.item-title{
font-weight:900;
font-size:1.6rem;
letter-spacing:1px;
margin-bottom:6px;
text-transform:uppercase;
}

.feed-item.tomtom .item-title{
color:var(--accent);
}

.item-desc{
font-size:1.25rem;
line-height:1.6;
}

.status-msg{
display:flex;
justify-content:center;
align-items:center;
height:100%;
font-size:1.5rem;
font-weight:800;
color:var(--success);
text-align:center;
padding:20px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<header>

<div></div>

<div class="header-center">
<h1>INFO VIABILITÀ</h1>
<span class="separator">|</span>
<img src="logo.png" onerror="this.style.display='none'">
</div>

<div class="header-right">
<div id="date-box">DATA...</div>
<div id="clock">00:00</div>
</div>

</header>

<main>

<div class="panel">

<div class="panel-header header-permanente">
Segnalazione Permanente
</div>

<div class="fixed-content">

<div class="alert-box">
<div class="title">A8 GALLARATE</div>

<div class="body-text">
ENTRATA CHIUSA dalle ore
<span class="highlight">21:00</span>
del
<span class="highlight">23/02/2026</span>
alle ore
<span class="highlight">05:00</span>
del
<span class="highlight">24/06/2026</span>
in direzione MILANO.
</div>
</div>

<div class="detour-section">
<div class="detour-label">
Entrata consigliata verso Milano:
</div>

<div class="detour-value">
BUSTO ARSIZIO
</div>
</div>

</div>
</div>

<div class="panel">

<div class="panel-header header-bollettino">
BOLLETTINO VIABILITÀ
</div>

<div id="feed" class="feed-container">
<div class="status-msg">SINCRONIZZAZIONE DATI...</div>
</div>

</div>

</main>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv";

const TOMTOM_KEY="Qzrni4pCQqUX2G25YPRBqff8LfAFBQLt";

const TOMTOM_URL=`https://api.tomtom.com/traffic/services/5/incidentDetails?bbox=8.70,45.58,8.90,45.72&key=${TOMTOM_KEY}&language=it-IT`;

function updateClock(){

const now=new Date();

document.getElementById('date-box').textContent=
now.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

document.getElementById('clock').textContent=
now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

}

setInterval(updateClock,1000);
updateClock();

async function fetchAll(){

const container=document.getElementById("feed");

try{

let html="";
let count=0;

const csv=await fetch(CSV_URL+"&t="+Date.now());
const text=await csv.text();
const rows=text.split("\n");

rows.forEach(row=>{

const cols=row.split(",");

const colA=cols[0]?cols[0].trim():"";
const colC=cols[2]?cols[2].trim():"";

if(colA!=="" && colC!==""){

html+=`
<div class="feed-item">
<div class="item-title">${colA}</div>
<div class="item-desc">${colC}</div>
</div>`;

count++;

}

});

try{

const tt=await fetch(TOMTOM_URL);
const data=await tt.json();

data.incidents.forEach(i=>{

const desc=i.properties.events?.[0]?.description;

if(desc){

html+=`
<div class="feed-item tomtom">
<div class="item-title">TRAFFICO TOMTOM</div>
<div class="item-desc">${desc}</div>
</div>`;

count++;

}

});

}catch(e){
console.log("TomTom offline");
}

container.innerHTML=
count>0
?html
:'<div class="status-msg">✅ NESSUNA SEGNALAZIONE</div>';

}

catch(err){

console.error(err);

container.innerHTML='<div class="status-msg">⚠️ ERRORE LETTURA DATI</div>';

}

}

fetchAll();
setInterval(fetchAll,60000);

</script>

</body>
</html>
