<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>INFO VIABILITÀ - SEDE OPERATIVA</title>
    <style>
        :root {
            --bg-main: #0a0f18; --bg-card: #161e2e; --border: #2d3748;
            --text-bright: #f8fafc; --text-dim: #94a3b8;
            --danger: #e11d48; --warning: #fbbf24; --success: #4ade80;
            --header-dark: #1e293b; --header-red: #450a0a;
        }
        body.light-mode {
            --bg-main: #f1f5f9; --bg-card: #ffffff; --border: #cbd5e1;
            --text-bright: #0f172a; --text-dim: #475569;
            --header-dark: #e2e8f0; --header-red: #fee2e2;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-main); color: var(--text-bright);
            font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 25px;
            height: 100vh; display: grid; grid-template-rows: 90px 1fr; gap: 25px; overflow: hidden;
        }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 2px solid var(--border); }
        .clock { font-size: 3rem; font-weight: 700; font-family: monospace; }
        .logo-box img { max-height: 70px; }
        main { display: grid; grid-template-columns: 480px 1fr; gap: 25px; height: 100%; padding-bottom: 60px; }
        .panel { background: var(--bg-card); border: 2px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 18px 25px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; }
        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 3px solid var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); border-bottom: 3px solid var(--warning); }
        .fixed-alert { padding: 30px; border-left: 10px solid var(--danger); }
        .fixed-alert .title { color: var(--danger); font-size: 1.65rem; font-weight: 800; margin-bottom: 20px; }
        .fixed-alert .body-text { font-size: 1.35rem; line-height: 1.5; font-weight: bold; }
        .highlight { color: var(--warning); font-weight: bold; }
        .detour { margin-top: auto; background: rgba(0,0,0,0.05); padding: 25px; border-top: 2px solid var(--border); }
        .detour div { font-size: 2.4rem; font-weight: 900; color: var(--warning); margin-top: 5px; }
        .feed-container { padding: 0 25px; overflow-y: auto; }
        .feed-item { padding: 22px 0; border-bottom: 1px solid var(--border); }
        .item-title { color: var(--warning); font-weight: bold; font-size: 1.2rem; margin-bottom: 8px; }
        .status-msg { display: flex; justify-content: center; align-items: center; height: 80%; padding: 40px; color: var(--success); font-size: 2.2rem; font-weight: 700; text-align: center; }
        .footer-logo { position: absolute; bottom: 25px; right: 25px; }
        .footer-logo img { max-height: 60px; opacity: 0.9; }
    </style>
</head>
<body>
    <header>
        <h1 style="font-size: 1.5rem; color: var(--text-dim);">INFO VIABILITÀ</h1>
        <div id="clock" class="clock">00:00:00</div>
        <div class="logo-box"><img src="logo.png" onerror="this.style.display='none'"></div>
    </header>
    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-alert">
                <div class="title">A8 GALLARATE - ENTRATA CHIUSA</div>
                <div class="body-text">Entrata chiusa dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> in direzione Milano per lavori.</div>
            </div>
            <div class="detour"><span>Entrata consigliata verso Milano</span><div>Busto Arsizio</div></div>
        </div>
        <div class="panel">
            <div class="panel-header header-bollettino"><span>Bollettino CCISS</span><span id="last-update" style="font-size: 0.8rem; font-weight: normal; opacity: 0.7;">-</span></div>
            <div id="feed" class="feed-container"><div class="status-msg">Inizializzazione...</div></div>
        </div>
    </main>
    <div class="footer-logo"><img src="logo CCISS.png" onerror="this.style.display='none'"></div>
    <script>
        function updateTheme() {
            const h = new Date().getHours();
            document.body.classList.toggle('light-mode', h >= 8 && h < 18);
        }
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false });
            updateTheme();
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchCCISS() {
            const container = document.getElementById('feed');
            const updateLabel = document.getElementById('last-update');
            const rssUrl = "https://www.cciss.it/rss";
            // Proxy AllOrigins per prendere l'XML puro e saltare la cache
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;

            try {
                const resp = await fetch(proxy);
                const json = await resp.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(json.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                container.innerHTML = "";
                let found = 0;
                let debugInfo = "Ultime news (nessun filtro):<br>";

                const keys = ["varese", "gallarate", "busto", "castellanza", "saronno", "a8", "a36", "pedemontana", "malpensa", "besnate", "lainate", "vergiate", "gazzada"];

                items.forEach((item, index) => {
                    const title = item.querySelector("title")?.textContent || "";
                    const desc = item.querySelector("description")?.textContent || "";
                    const full = (title + " " + desc).toLowerCase();
                    
                    if(index < 3) debugInfo += `- ${title.substring(0,40)}...<br>`;

                    // Filtro Varese (ovunque) o Keywords (parole intere)
                    const isVarese = full.includes("varese");
                    const hasKey = keys.some(k => new RegExp("\\b" + k + "\\b", "i").test(full));

                    if (isVarese || hasKey) {
                        const div = document.createElement('div');
                        div.className = 'feed-item';
                        div.innerHTML = `<div class="item-title">${title.toUpperCase()}</div><div class="item-desc">${desc}</div>`;
                        container.appendChild(div);
                        found++;
                    }
                });

                if (found === 0) {
                    container.innerHTML = `<div class="status-msg">Nessuna nuova segnalazione per l'area della Provincia di Varese</div>
                                          <div style="font-size:0.7rem; color:gray; padding:10px;">${debugInfo}</div>`;
                }
                updateLabel.textContent = "Aggiornato: " + new Date().toLocaleTimeString('it-IT');
            } catch (e) {
                updateLabel.textContent = "Errore RSS";
            }
        }
        fetchCCISS(); setInterval(fetchCCISS, 300000);
    </script>
</body>
</html>
