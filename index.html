<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO VIABILITÀ</title>

    <style>
        :root {
            --bg-main: #020617;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border: rgba(51, 65, 85, 0.5);
            --accent: #38bdf8;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --warning: #fbbf24;
            --success: #22c55e;
            --header-bg: rgba(15, 23, 42, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-main);
            color: var(--text-bright);
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: var(--header-bg);
            border-bottom: 2px solid var(--accent);
            padding: 10px 30px;
        }

        .header-center {
            grid-column: 2;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-center h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .separator {
            font-size: 2rem;
            color: var(--accent);
        }

        .header-center img {
            height: 75px;
        }

        .header-right {
            grid-column: 3;
            text-align: right;
        }

        #date-box {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        #clock {
            font-size: 3.8rem;
            font-weight: 900;
            color: var(--warning);
        }

        main {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .header-permanente { color: var(--danger); }
        .header-bollettino { color: var(--warning); }

        .fixed-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            gap: 20px;
            overflow-y: auto; /* Aggiunto per permettere lo scorrimento di avvisi multipli */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .fixed-content::-webkit-scrollbar {
            display: none;
        }

        .alert-box {
            padding: 20px;
            background: rgba(244, 63, 94, 0.1);
            border-radius: 15px;
            border-left: 8px solid var(--danger);
            flex-shrink: 0;
        }

        .alert-box .title {
            color: var(--danger);
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .alert-box .body-text {
            font-size: 1.3rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .highlight {
            color: var(--warning);
            font-weight: 800;
        }

        .detour-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--accent);
        }

        .detour-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 700;
        }

        .detour-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
        }

        .feed-container {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .feed-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 10px solid var(--warning);
            border-radius: 10px;
            padding: 20px;
        }

        .item-title {
            color: var(--warning);
            font-weight: 900;
            font-size: 1.4rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .item-desc {
            font-size: 1.2rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .status-msg {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--success);
            text-align: center;
            padding: 20px;
            flex-shrink: 0;
        }

        /* ==================================================== */
        /* ADATTAMENTO SMARTPHONE (MOBILE FRIENDLY) */
        /* ==================================================== */
        @media (max-width: 900px) {
            body {
                height: auto;
                overflow: auto;
            }

            header {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 15px;
                padding: 20px 15px;
            }

            .header-center {
                grid-column: 1;
                justify-content: center;
                flex-direction: column-reverse;
                gap: 10px;
            }

            .separator { display: none; }

            .header-right {
                grid-column: 1;
                text-align: center;
            }

            .header-center h1 { font-size: 1.8rem; }
            #clock { font-size: 3rem; }

            main {
                grid-template-columns: 1fr;
                height: auto;
                overflow: visible;
                padding: 10px;
            }

            .panel {
                margin-bottom: 20px;
            }

            .alert-box .title { font-size: 1.6rem; }
            .alert-box .body-text { font-size: 1.1rem; }
            .detour-value { font-size: 1.8rem; }
            
            .feed-container, .fixed-content {
                max-height: 500px;
            }

            .item-title { font-size: 1.2rem; }
            .item-desc { font-size: 1.1rem; }
        }
    </style>
</head>

<body>

    <header>
        <div></div>

        <div class="header-center">
            <h1>INFO VIABILITÀ</h1>
            <span class="separator">|</span>
            <img src="logo.png" onerror="this.style.display='none'">
        </div>

        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00</div>
        </div>
    </header>

    <main>
        <!-- Pannello Segnalazione Permanente -->
        <div class="panel">
            <div class="panel-header header-permanente">
                Segnalazione Permanente
            </div>
            <div id="permanent-feed" class="fixed-content">
                <div class="status-msg">
                    ATTENDERE...
                </div>
            </div>
        </div>

        <!-- Pannello Bollettino CSV -->
        <div class="panel">
            <div class="panel-header header-bollettino">
                BOLLETTINO VIABILITÀ
            </div>
            <div id="feed" class="feed-container">
                <div class="status-msg">
                    SINCRONIZZAZIONE DATI...
                </div>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv";

        // ==========================================
        // DATABASE CHIUSURE PROGRAMMATE
        // Si attivano alla mezzanotte del giorno di inizio
        // e scadono alle 05:00 del mattino del giorno di fine
        // ==========================================
        const programmedAlerts = [
            { // 13-14 Luglio
                start: new Date(2026, 6, 13, 0, 0), end: new Date(2026, 6, 14, 5, 0),
                title: "A8 LEGNANO", period: "Notte tra 13 e 14 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in direzione Milano.",
                detour: "Ingresso consigliato: <span class='highlight'>Castellanza</span>"
            },
            { // 14-15 Luglio (Cavaria)
                start: new Date(2026, 6, 14, 0, 0), end: new Date(2026, 6, 15, 5, 0),
                title: "A8 CAVARIA", period: "Notte tra 14 e 15 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in entrambe le direzioni.",
                detour: "Verso Milano: <span class='highlight'>Gallarate</span><br>Verso Varese: <span class='highlight'>Solbiate Arno - Albizzate</span>"
            },
            { // 14-15 Luglio (Legnano)
                start: new Date(2026, 6, 14, 0, 0), end: new Date(2026, 6, 15, 5, 0),
                title: "A8 LEGNANO", period: "Notte tra 14 e 15 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in direzione Milano.",
                detour: "Ingresso consigliato: <span class='highlight'>Castellanza</span>"
            },
            { // 15-16 Luglio (Cavaria)
                start: new Date(2026, 6, 15, 0, 0), end: new Date(2026, 6, 16, 5, 0),
                title: "A8 CAVARIA", period: "Notte tra 15 e 16 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in entrambe le direzioni.",
                detour: "Verso Milano: <span class='highlight'>Gallarate</span><br>Verso Varese: <span class='highlight'>Solbiate Arno - Albizzate</span>"
            },
            { // 15-16 Luglio (Castellanza)
                start: new Date(2026, 6, 15, 0, 0), end: new Date(2026, 6, 16, 5, 0),
                title: "A8 CASTELLANZA", period: "Notte tra 15 e 16 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in direzione Milano.",
                detour: "Ingresso consigliato: <span class='highlight'>Legnano</span>"
            },
            { // 16-17 Luglio (Cavaria)
                start: new Date(2026, 6, 16, 0, 0), end: new Date(2026, 6, 17, 5, 0),
                title: "A8 CAVARIA", period: "Notte tra 16 e 17 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in entrambe le direzioni.",
                detour: "Verso Milano: <span class='highlight'>Gallarate</span><br>Verso Varese: <span class='highlight'>Varese</span>"
            },
            { // 16-17 Luglio (Castellanza)
                start: new Date(2026, 6, 16, 0, 0), end: new Date(2026, 6, 17, 5, 0),
                title: "A8 CASTELLANZA", period: "Notte tra 16 e 17 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in direzione Milano.",
                detour: "Ingresso consigliato: <span class='highlight'>Legnano</span>"
            },
            { // 16-17 Luglio (Legnano)
                start: new Date(2026, 6, 16, 0, 0), end: new Date(2026, 6, 17, 5, 0),
                title: "A8 LEGNANO", period: "Notte tra 16 e 17 Luglio", hours: "21:00 - 05:00",
                desc: "Uscita chiusa in entrambe le direzioni.",
                detour: "Uscita cons.: <span class='highlight'>Castellanza</span> (da MI e VA)"
            },
            { // 17-18 Luglio
                start: new Date(2026, 6, 17, 0, 0), end: new Date(2026, 6, 18, 5, 0),
                title: "A8 CASTELLANZA", period: "Notte tra 17 e 18 Luglio", hours: "21:00 - 05:00",
                desc: "Entrata chiusa in direzione Milano.",
                detour: "Ingresso consigliato: <span class='highlight'>Legnano</span>"
            },
            { // 18-19 Luglio
                start: new Date(2026, 6, 18, 0, 0), end: new Date(2026, 6, 19, 5, 0),
                title: "A8 CAVARIA", period: "Notte tra 18 e 19 Luglio", hours: "22:00 - 05:00",
                desc: "Entrata chiusa in entrambe le direzioni.",
                detour: "Verso Milano: <span class='highlight'>Gallarate</span><br>Verso Varese: <span class='highlight'>Castronno</span>"
            },
            { // 19-20 Luglio
                start: new Date(2026, 6, 19, 0, 0), end: new Date(2026, 6, 20, 5, 0),
                title: "A8 CAVARIA", period: "Notte tra 19 e 20 Luglio", hours: "22:00 - 05:00",
                desc: "Entrata chiusa in entrambe le direzioni.",
                detour: "Verso Milano: <span class='highlight'>Gallarate</span><br>Verso Varese: <span class='highlight'>Solbiate Arno - Albizzate</span>"
            }
        ];

        function updatePermanentAlerts() {
            const container = document.getElementById("permanent-feed");
            const now = new Date();
            let html = "";
            let count = 0;

            programmedAlerts.forEach(alert => {
                // Se la data di oggi rientra tra l'inizio e la fine dell'evento
                if (now >= alert.start && now <= alert.end) {
                    html += `
                    <div class="alert-box">
                        <div class="title">${alert.title}</div>
                        <div class="body-text">
                            <span class="highlight" style="font-size: 1rem;">${alert.period} (${alert.hours})</span><br><br>
                            ${alert.desc}<br><br>
                            <span style="font-size: 1.1rem">${alert.detour}</span>
                        </div>
                    </div>
                    `;
                    count++;
                }
            });

            container.innerHTML = count > 0 
                ? html 
                : '<div class="status-msg">✅ NESSUNA CHIUSURA PROGRAMMATA</div>';
            
            // Imposta flex-start se ci sono avvisi per farli scorrere correttamente, 
            // altrimenti center per il messaggio NESSUNA CHIUSURA
            container.style.justifyContent = count > 0 ? "flex-start" : "center";
        }

        function updateClock() {
            const now = new Date();

            const optionsDate = {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            };

            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', optionsDate);
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            
            // Controllo validità alert permanente ogni volta che scatta il clock (ogni secondo)
            updatePermanentAlerts(); 
        }

        setInterval(updateClock, 1000);
        updateClock();

        async function fetchCSV() {
            const container = document.getElementById("feed");

            try {
                const response = await fetch(CSV_URL + "&t=" + Date.now());
                const text = await response.text();
                const rows = text.split("\n");

                let html = "";
                let count = 0;

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                    const colA = cols[0] ? cols[0].replace(/^"|"$/g, '').trim() : "";
                    const colC = cols[2] ? cols[2].replace(/^"|"$/g, '').trim() : "";

                    if (colA !== "" && colC !== "") {
                        html += `
                        <div class="feed-item">
                            <div class="item-title">${colA}</div>
                            <div class="item-desc">${colC}</div>
                        </div>
                        `;
                        count++;
                    }
                });

                container.innerHTML = count > 0 
                    ? html 
                    : '<div class="status-msg">✅ NESSUNA SEGNALAZIONE</div>';

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="status-msg">⚠️ ERRORE LETTURA CSV</div>';
            }
        }

        fetchCSV();
        setInterval(fetchCSV, 60000);

        // Funzione per autoscroll di un contenitore specifico
        function autoScroll(elementId) {
            const el = document.getElementById(elementId);
            if (el && el.scrollHeight > el.clientHeight) {
                el.scrollTop += 1;
                if (Math.ceil(el.scrollTop) + el.clientHeight >= el.scrollHeight) {
                    el.scrollTop = 0;
                }
            }
        }

        // Applica l'autoscroll sia al feed bollettino che agli avvisi permanenti
        setInterval(() => {
            autoScroll("feed");
            autoScroll("permanent-feed");
        }, 50);
    </script>

</body>
</html>
