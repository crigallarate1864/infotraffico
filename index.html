<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFO VIABILITÀ</title>

<style>

:root {
--bg-main:#020617;
--bg-card:rgba(30,41,59,0.7);
--border:rgba(51,65,85,0.5);
--accent:#38bdf8;
--text-bright:#f8fafc;
--text-dim:#94a3b8;
--danger:#f43f5e;
--warning:#fbbf24;
--success:#22c55e;
--header-bg:rgba(15,23,42,0.9);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:var(--bg-main);
color:var(--text-bright);
font-family:system-ui;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
background:var(--header-bg);
border-bottom:2px solid var(--accent);
padding:10px 30px;
}

.header-center{
grid-column:2;
display:flex;
align-items:center;
gap:15px;
}

.header-center h1{
font-size:2.5rem;
font-weight:900;
text-transform:uppercase;
letter-spacing:2px;
}

.header-center img{
height:70px;
}

.header-right{
grid-column:3;
text-align:right;
}

#date-box{
font-size:1rem;
font-weight:700;
text-transform:uppercase;
color:var(--text-dim);
}

#clock{
font-size:3.5rem;
font-weight:900;
color:var(--warning);
}

main{
display:grid;
grid-template-columns:450px 1fr;
gap:20px;
padding:20px;
flex-grow:1;
overflow:hidden;
}

.panel{
background:var(--bg-card);
border:1px solid var(--border);
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.panel-header{
padding:15px 20px;
font-weight:900;
text-transform:uppercase;
border-bottom:2px solid var(--border);
background:rgba(0,0,0,0.2);
}

.header-bollettino{
color:var(--warning);
border-color:var(--warning);
}

.feed-container{
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.feed-item{
background:rgba(255,255,255,0.03);
border-left:10px solid var(--warning);
border-radius:10px;
padding:20px;
}

.item-title{
color:var(--warning);
font-weight:900;
font-size:1.4rem;
margin-bottom:8px;
text-transform:uppercase;
}

.item-desc{
font-size:1.2rem;
line-height:1.5;
font-weight:500;
}

.status-msg{
display:flex;
justify-content:center;
align-items:center;
height:100%;
font-size:1.5rem;
font-weight:800;
color:var(--success);
text-align:center;
}

</style>
</head>

<body>

<header>

<div></div>

<div class="header-center">
<h1>INFO VIABILITÀ</h1>
<img src="logo.png" onerror="this.style.display='none'">
</div>

<div class="header-right">
<div id="date-box">DATA...</div>
<div id="clock">00:00</div>
</div>

</header>

<main>

<div class="panel">
<div class="panel-header header-bollettino">
PROVINCIA DI VARESE | A8 | A36 | LEGNANO | SS336
</div>

<div id="feed" class="feed-container">
<div class="status-msg">SINCRONIZZAZIONE DATI TRAFFICO...</div>
</div>

</div>

</main>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv";

const TOMTOM_KEY="Qzrni4pCQqUX2G25YPRBqff8LfAFBQLt";

const TOMTOM_URL=`https://api.tomtom.com/traffic/services/5/incidentDetails?bbox=8.70,45.58,8.90,45.72&key=${TOMTOM_KEY}&language=it-IT`;

function updateClock(){

const now=new Date();

document.getElementById("date-box").textContent=
now.toLocaleDateString("it-IT",{weekday:'long',day:'numeric',month:'long',year:'numeric'});

document.getElementById("clock").textContent=
now.toLocaleTimeString("it-IT",{hour:'2-digit',minute:'2-digit'});

}

setInterval(updateClock,1000);
updateClock();

async function loadCSV(){

const response=await fetch(CSV_URL+"&t="+Date.now());
const text=await response.text();

const rows=text.split("\n");

let items=[];

rows.forEach(row=>{

const cols=row.split(",");

const titolo=cols[0]?.trim();
const descrizione=cols[2]?.trim();

if(titolo){

items.push({
title:titolo,
desc:descrizione || ""
});

}

});

return items;

}

async function loadTomTom(){

try{

const response=await fetch(TOMTOM_URL);
const data=await response.json();

let items=[];

data.incidents.forEach(i=>{

const desc=i.properties.events?.[0]?.description || "Evento traffico";

items.push({
title:"TRAFFICO",
desc:desc
});

});

return items;

}catch{

return [];

}

}

async function loadAll(){

const container=document.getElementById("feed");

container.innerHTML='<div class="status-msg">AGGIORNAMENTO DATI...</div>';

const csv=await loadCSV();
const tomtom=await loadTomTom();

const all=[...csv,...tomtom];

if(all.length===0){

container.innerHTML='<div class="status-msg">NESSUNA CRITICITÀ SEGNALATA</div>';
return;

}

let html="";

all.forEach(i=>{

html+=`
<div class="feed-item">
<div class="item-title">${i.title}</div>
<div class="item-desc">${i.desc}</div>
</div>
`;

});

container.innerHTML=html;

}

loadAll();

setInterval(loadAll,60000);

</script>

</body>
</html>
