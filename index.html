<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO VIABILITÀ | logo.png</title>
    <style>
        :root {
            --bg-main: #000000; 
            --bg-card: #111827; 
            --border: #374151;
            --accent: #0ea5e9;
            --text-bright: #ffffff; 
            --text-dim: #9ca3af;
            --danger: #ff0033; 
            --warning: #ffcc00; 
            --success: #22c55e;
            --header-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main); 
            color: var(--text-bright);
            font-family: 'Segoe UI', Arial, sans-serif; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: var(--header-bg);
            border-bottom: 3px solid var(--accent);
            padding: 15px 30px;
        }

        .header-center {
            grid-column: 2;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-center h1 {
            font-size: 3rem; 
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
        }

        .header-center .separator { font-size: 3rem; color: var(--accent); }
        .header-center img { height: 85px; width: auto; }

        .header-right { 
            grid-column: 3;
            text-align: right; 
        }

        #date-box {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
        }

        #clock {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1;
            color: var(--warning);
        }

        main {
            display: grid;
            grid-template-columns: 500px 1fr; 
            gap: 25px;
            padding: 25px;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            background: #1e293b;
            border-bottom: 2px solid var(--border);
        }

        .header-permanente { color: var(--danger); border-bottom-color: var(--danger); }
        .header-bollettino { color: var(--warning); border-bottom-color: var(--warning); }

        .fixed-content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        .alert-box { 
            padding: 25px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 10px;
            border: 2px solid var(--danger);
        }

        .alert-box .title { 
            color: var(--danger); 
            font-size: 2.5rem; 
            font-weight: 900; 
            margin-bottom: 15px;
        }

        .alert-box .body-text { font-size: 1.6rem; line-height: 1.3; font-weight: 700; }
        .highlight { color: var(--warning); background: #000; padding: 0 5px; }

        .detour-section { 
            background: #000;
            padding: 25px; 
            border-radius: 10px; 
            border: 2px solid var(--accent); 
        }

        .detour-label { font-size: 1.2rem; color: var(--text-dim); font-weight: 800; margin-bottom: 5px; }
        .detour-value { font-size: 3rem; font-weight: 900; color: var(--accent); }

        .feed-container { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .feed-item { 
            background: #1f2937;
            border-left: 10px solid var(--warning);
            padding: 25px;
            border-radius: 5px;
        }

        .item-title { 
            color: var(--warning); 
            font-weight: 900; 
            font-size: 1.8rem; 
            margin-bottom: 10px; 
            text-transform: uppercase;
        }

        .item-desc { 
            font-size: 1.5rem; 
            line-height: 1.4; 
            color: #ffffff; 
            font-weight: 600;
        }

        .status-msg { font-size: 2rem; text-align: center; margin-top: 50px; font-weight: 900; color: var(--success); }
    </style>
</head>
<body>

    <header>
        <div></div>
        <div class="header-center">
            <h1>INFO VIABILITÀ</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="" onerror="this.style.display='none'">
        </div>
        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">
                        ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> 
                        alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> 
                        in direzione MILANO.
                    </div>
                </div>

                <div class="detour-section">
                    <div class="detour-label">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">PROVINCIA DI VARESE | A8 | A36 | LEGNANO | SS336</div>
            <div id="feed" class="feed-container">
                <div class="status-msg">CONNESSIONE RSS...</div>
            </div>
        </div>
    </main>

    <script>
        const RSS_URL = 'https://www.cciss.it/rss';
        const PROXY = "https://corsproxy.io/?";
        
        // Filtri richiesti
        const keywords = ["varese", "a8", "a36", "legnano", "ss336", "gallarate", "busto arsizio", "malpensa"];

        function updateClock() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', optionsDate);
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); 
        updateClock();

        async function fetchRSS() {
            const container = document.getElementById('feed');
            try {
                const response = await fetch(PROXY + encodeURIComponent(RSS_URL + '?t=' + Date.now()));
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const items = xml.querySelectorAll("item");
                
                let contentHTML = "";
                let count = 0;

                items.forEach(item => {
                    const title = item.querySelector("title").textContent;
                    const desc = item.querySelector("description").textContent;
                    const combined = (title + " " + desc).toLowerCase();

                    const matches = keywords.some(key => combined.includes(key));

                    if (matches) {
                        contentHTML += `
                            <div class="feed-item">
                                <div class="item-title">${title.toUpperCase()}</div>
                                <div class="item-desc">${desc}</div>
                            </div>`;
                        count++;
                    }
                });

                if (count > 0) {
                    container.innerHTML = contentHTML;
                } else {
                    container.innerHTML = '<div class="status-msg">✅ NESSUNA NOTIZIA RILEVATA</div>';
                }

            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="status-msg">⚠️ ERRORE RICEZIONE RSS</div>';
            }
        }

        // Aggiornamento ogni 60 secondi (standard per RSS CCISS)
        fetchRSS();
        setInterval(fetchRSS, 60000);
    </script>
</body>
</html>
