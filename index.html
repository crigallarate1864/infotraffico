<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MONITORAGGIO VIABILITÀ</title>
    <style>
        :root {
            --bg-main: #0a0f18; --bg-card: #161e2e; --border: #2d3748;
            --text-bright: #f8fafc; --text-dim: #94a3b8;
            --danger: #e11d48; --warning: #fbbf24; --success: #4ade80;
            --header-dark: #1e293b; --header-red: #450a0a;
        }
        body.light-mode {
            --bg-main: #f8fafc; --bg-card: #ffffff; --border: #cbd5e1;
            --text-bright: #0f172a; --text-dim: #475569;
            --header-dark: #e2e8f0; --header-red: #fee2e2;
            --warning: #b45309; --success: #15803d;
        }
        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-main); color: var(--text-bright);
            font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 25px;
            height: 100vh; display: grid; grid-template-rows: 120px 1fr; gap: 20px; overflow: hidden;
        }

        /* HEADER MASTER CENTRATO */
        header {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            border-bottom: 3px solid var(--border); padding-bottom: 15px;
        }
        .header-center { display: flex; align-items: center; gap: 25px; }
        .header-center h1 { font-size: 3.2rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .header-center .separator { font-size: 3rem; color: var(--border); font-weight: 300; }
        .header-center img { max-height: 80px; width: auto; }

        .header-right { justify-self: end; text-align: right; width: 400px; }
        #date-box { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
        #clock { font-size: 4.2rem; font-weight: 900; font-family: monospace; color: var(--warning); line-height: 0.9; }

        /* LAYOUT */
        main { display: grid; grid-template-columns: 520px 1fr; gap: 25px; height: calc(100vh - 160px); overflow: hidden; }
        .panel { background: var(--bg-card); border: 2px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 18px 25px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; flex-shrink: 0; }
        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 4px solid var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); border-bottom: 4px solid var(--warning); }

        .fixed-content { padding: 35px; }
        .alert-box { border-left: 12px solid var(--danger); padding-left: 25px; margin-bottom: 50px; }
        .alert-box .title { color: var(--danger); font-size: 2.1rem; font-weight: 900; margin-bottom: 15px; }
        .alert-box .body-text { font-size: 1.6rem; line-height: 1.4; font-weight: 600; }
        .detour-section { background: rgba(0, 0, 0, 0.05); padding: 30px; border-radius: 10px; border: 2px solid var(--border); }
        .detour-value { font-size: 3rem; font-weight: 900; color: var(--warning); }
        .highlight { color: var(--warning); font-weight: 800; }

        /* FEED SCORREVOLE */
        .feed-container { 
            padding: 25px; overflow-y: scroll; flex-grow: 1; 
            display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: none; 
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .feed-item { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 25px; flex-shrink: 0; }
        body.light-mode .feed-item { background: #fdfdfd; }
        .item-title { color: var(--warning); font-weight: 900; font-size: 1.7rem; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 8px; }
        .item-desc { font-size: 1.5rem; line-height: 1.5; font-weight: 500; }

        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 2.2rem; font-weight: 800; color: var(--success); text-align: center; flex-direction: column; }

        /* LOGO CCISS RIPRISTINATO */
        .footer-logo { position: absolute; bottom: 30px; right: 40px; z-index: 100; }
        .footer-logo img { max-height: 75px; width: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

    <header>
        <div class="header-left"></div>
        <div class="header-center">
            <h1>Info Viabilità</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="" onerror="this.style.visibility='hidden'">
        </div>
        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> in direzione MILANO.</div>
                </div>
                <div class="detour-section">
                    <div style="font-size:1.1rem; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px;">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">
                <span>BOLLETTINO LIVE DA GOOGLE SHEETS</span>
                <span id="sync-status" style="font-size: 0.9rem; opacity: 0.7;">CONNESSIONE...</span>
            </div>
            <div id="feed" class="feed-container">
                <div class="status-msg" id="main-status">RICERCA DATI IN CORSO...</div>
            </div>
        </div>
    </main>

    <div class="footer-logo">
        <img src="logo CCISS.png" alt="CCISS" onerror="this.style.visibility='hidden'">
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?gid=0&single=true&output=csv';
        
        // Proxy più potente per evitare il blocco CORS
        const PROXY = "https://corsproxy.io/?";

        function updateClock() {
            const now = new Date();
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            document.body.classList.toggle('light-mode', now.getHours() >= 8 && now.getHours() < 18);
        }
        setInterval(updateClock, 1000); updateClock();

        function parseCSV(text) {
            const rows = []; let row = []; let col = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else if (char !== '\r') { col += char; }
            }
            if (row.length > 0 || col !== "") { row.push(col); rows.push(row); }
            return rows;
        }

        async function fetchFromSheets() {
            const container = document.getElementById('feed');
            const syncStatus = document.getElementById('sync-status');
            const mainStatus = document.getElementById('main-status');
            
            try {
                // Utilizzo forzato del proxy con timestamp anti-cache
                const finalUrl = PROXY + encodeURIComponent(CSV_URL + '&cachebust=' + new Date().getTime());
                const response = await fetch(finalUrl);
                
                if (!response.ok) throw new Error("Server non risponde");
                
                const csvData = await response.text();
                const rows = parseCSV(csvData);
                
                let contentHTML = "";
                let count = 0;

                rows.forEach(cols => {
                    if (cols.length >= 3) {
                        const title = cols[0].trim();
                        const desc = cols[2] ? cols[2].trim() : "";
                        
                        // Legge tutto quello che passa lo script del foglio
                        if (title.length > 2 && !title.toLowerCase().includes("nessuna criticità")) {
                            contentHTML += `
                                <div class="feed-item">
                                    <div class="item-title">${title.toUpperCase()}</div>
                                    <div class="item-desc">${desc}</div>
                                </div>`;
                            count++;
                        }
                    }
                });

                if (count > 0) {
                    container.innerHTML = contentHTML;
                } else {
                    container.innerHTML = '<div class="status-msg">✅ NESSUNA NOTIZIA PRESENTE NEL FOGLIO</div>';
                }
                syncStatus.textContent = "LIVE - OK: " + new Date().toLocaleTimeString();

            } catch (e) {
                syncStatus.textContent = "ERRORE CONNESSIONE";
                container.innerHTML = `<div class="status-msg" style="color:red;">⚠️ ERRORE DI LETTURA DATI<br><small style="font-size:1.1rem; color:var(--text-dim);">Prova ad aprire il file in una finestra INCÒGNITO</small></div>`;
            }
        }

        function startAutoScroll() {
            const container = document.getElementById('feed');
            setInterval(() => {
                if (container.scrollHeight > container.clientHeight) {
                    container.scrollTop += 1;
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 1) {
                        setTimeout(() => { container.scrollTop = 0; }, 4000); 
                    }
                }
            }, 50);
        }

        fetchFromSheets();
        setInterval(fetchFromSheets, 60000);
        startAutoScroll();
    </script>
</body>
</html>
