<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO VIABILITÀ | logo.png</title>
    <style>
        :root {
            --bg-main: #020617; 
            --bg-card: rgba(30, 41, 59, 0.7); 
            --border: rgba(51, 65, 85, 0.5);
            --accent: #38bdf8;
            --text-bright: #f8fafc; 
            --text-dim: #94a3b8;
            --danger: #f43f5e; 
            --warning: #fbbf24; 
            --success: #22c55e;
            --header-bg: rgba(15, 23, 42, 0.9);
            --glow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        body.light-mode {
            --bg-main: #f1f5f9; 
            --bg-card: rgba(255, 255, 255, 0.8); 
            --border: #cbd5e1;
            --accent: #0284c7;
            --text-bright: #0f172a; 
            --text-dim: #475569;
            --header-bg: #ffffff;
            --warning: #d97706; 
            --success: #166534;
            --glow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main); 
            color: var(--text-bright);
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 10px 30px;
            z-index: 10;
        }

        .header-center {
            grid-column: 2;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-center h1 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-bright);
        }

        .header-center .separator {
            font-size: 2rem;
            color: var(--border);
            font-weight: 300;
        }

        .header-center img { 
            height: 70px; 
            width: auto;
        }

        .header-right { 
            grid-column: 3;
            text-align: right; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #date-box {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        #clock {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            color: var(--warning);
        }

        main {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .header-permanente { color: var(--danger); background: rgba(225, 29, 72, 0.1); }
        .header-bollettino { color: var(--warning); background: rgba(251, 191, 36, 0.1); }

        .fixed-content { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .alert-box { 
            padding: 20px;
            background: rgba(225, 29, 72, 0.05);
            border-radius: 15px;
            border-left: 5px solid var(--danger);
        }

        .alert-box .title { 
            color: var(--danger); 
            font-size: 1.8rem; 
            font-weight: 900; 
            margin-bottom: 10px;
        }

        .alert-box .body-text { font-size: 1.15rem; line-height: 1.4; font-weight: 600; }
        .highlight { color: var(--warning); font-weight: 800; }

        .detour-section { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 15px 20px; 
            border-radius: 15px; 
            border: 1px solid var(--border); 
        }

        .detour-label { font-size: 0.85rem; text-transform: uppercase; color: var(--text-dim); font-weight: 700; }
        .detour-value { font-size: 2.2rem; font-weight: 900; color: var(--accent); }

        .feed-container { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .feed-item { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 18px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .item-title { color: var(--warning); font-weight: 900; font-size: 1.2rem; margin-bottom: 5px; }
        .item-desc { font-size: 1.05rem; line-height: 1.4; color: var(--text-bright); }

        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-weight: 700; color: var(--success); }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div></div>
        <div class="header-center">
            <h1>INFO VIABILITÀ</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="" onerror="this.style.display='none'">
        </div>
        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">
                        ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> 
                        alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> 
                        in direzione MILANO.
                    </div>
                </div>

                <div class="detour-section">
                    <div class="detour-label">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">PROVINCIA DI VARESE | A8 | A36 | LEGNANO</div>
            <div id="feed" class="feed-container">
                <div class="status-msg">SINCRO DATI...</div>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv';
        const PROXY = "https://corsproxy.io/?";

        const keywords = ["varese", "gallarate", "busto arsizio", "legnano", "saronno", "tradate", "somma lombardo", "caronno pertusella", "cassano magnago", "a8", "milano-laghi", "a36", "pedemontana"];

        function updateClock() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', optionsDate);
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            
            const hour = now.getHours();
            document.body.classList.toggle('light-mode', hour >= 8 && hour < 18);
        }
        setInterval(updateClock, 1000); 
        updateClock();

        function fastParseCSV(text) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return text.split(/\r?\n/).map(line => line.split(regex).map(cell => cell.replace(/^"|"$/g, '')));
        }

        async function fetchFromSheets() {
            const container = document.getElementById('feed');
            try {
                const response = await fetch(`${PROXY}${encodeURIComponent(CSV_URL)}&t=${Date.now()}`);
                const csvData = await response.text();
                const rows = fastParseCSV(csvData);
                let contentHTML = "";
                let count = 0;

                rows.forEach(cols => {
                    if (cols.length >= 3) {
                        const title = cols[0].trim();
                        const desc = cols[2].trim();
                        const fullText = (title + " " + desc).toLowerCase();
                        if (keywords.some(key => fullText.includes(key)) && title.length > 2) {
                            contentHTML += `<div class="feed-item"><div class="item-title">${title.toUpperCase()}</div><div class="item-desc">${desc}</div></div>`;
                            count++;
                        }
                    }
                });
                container.innerHTML = count > 0 ? contentHTML : '<div class="status-msg">✅ NESSUNA NOTIZIA RILEVATA</div>';
            } catch (e) {
                container.innerHTML = '<div class="status-msg">⚠️ ERRORE DATI</div>';
            }
        }

        fetchFromSheets();
        setInterval(fetchFromSheets, 30000);
    </script>
</body>
</html>
