<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MONITORAGGIO VIABILITÀ</title>
    <style>
        :root {
            --bg-main: #0a0f18; --bg-card: #161e2e; --border: #2d3748;
            --text-bright: #f8fafc; --text-dim: #94a3b8;
            --danger: #e11d48; --warning: #fbbf24; --success: #4ade80;
            --header-dark: #1e293b; --header-red: #450a0a;
        }
        body.light-mode {
            --bg-main: #f8fafc; --bg-card: #ffffff; --border: #cbd5e1;
            --text-bright: #0f172a; --text-dim: #475569;
            --header-dark: #e2e8f0; --header-red: #fee2e2;
            --warning: #b45309; --success: #15803d;
        }
        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-main); color: var(--text-bright);
            font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 20px;
            height: 100vh; display: grid; grid-template-rows: 110px 1fr; gap: 15px; overflow: hidden;
            position: relative;
        }

        /* HEADER MASTER CENTRATO */
        header {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            border-bottom: 3px solid var(--border); padding-bottom: 10px;
        }
        .header-center { display: flex; align-items: center; gap: 20px; }
        .header-center h1 { font-size: 2.8rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .header-center .separator { font-size: 2.5rem; color: var(--border); font-weight: 300; }
        .header-center img { max-height: 70px; width: auto; }

        .header-right { justify-self: end; text-align: right; width: 420px; }
        #date-box { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
        #clock { font-size: 3.8rem; font-weight: 900; font-family: monospace; color: var(--warning); line-height: 0.9; }

        /* LAYOUT */
        main { display: grid; grid-template-columns: 480px 1fr; gap: 20px; height: calc(100vh - 145px); overflow: hidden; }
        .panel { background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 15px 20px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; flex-shrink: 0; }
        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 3px solid var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); border-bottom: 3px solid var(--warning); }

        .fixed-content { padding: 25px; }
        .alert-box { border-left: 10px solid var(--danger); padding-left: 20px; margin-bottom: 35px; }
        .alert-box .title { color: var(--danger); font-size: 1.9rem; font-weight: 900; margin-bottom: 10px; }
        .alert-box .body-text { font-size: 1.4rem; line-height: 1.4; font-weight: 600; }
        .detour-section { background: rgba(0, 0, 0, 0.05); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .detour-value { font-size: 2.6rem; font-weight: 900; color: var(--warning); }

        /* FEED SCORREVOLE COMPATTO */
        .feed-container { 
            padding: 15px 20px; overflow-y: scroll; flex-grow: 1; 
            display: flex; flex-direction: column; gap: 12px; 
            scrollbar-width: none; 
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .feed-item { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 15px 20px; /* Ridotto padding interno */
            flex-shrink: 0; 
        }
        body.light-mode .feed-item { background: #fdfdfd; }
        
        .item-title { 
            color: var(--warning); 
            font-weight: 900; 
            font-size: 1.4rem; /* Leggermente ridotto */
            margin-bottom: 6px; 
            text-transform: uppercase; 
            border-bottom: 1px solid rgba(128,128,128,0.2); 
            padding-bottom: 4px; 
        }
        .item-desc { 
            font-size: 1.3rem; /* Leggermente ridotto per compattezza */
            line-height: 1.3; 
            font-weight: 500; 
        }

        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 2rem; font-weight: 800; color: var(--success); text-align: center; }

        /* LOGO CCISS - FISSO ESTERNO */
        .footer-logo { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .footer-logo img { max-height: 60px; width: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
    </style>
</head>
<body>

    <header>
        <div></div>
        <div class="header-center">
            <h1>Info Viabilità</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="" onerror="this.style.visibility='hidden'">
        </div>
        <div class="header-right">
            <div id="date-box">DATA...</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">ENTRATA CHIUSA dalle ore <span style="color:var(--warning)">21:00</span> del <span style="color:var(--warning)">23/02/2026</span> alle ore <span style="color:var(--warning)">05:00</span> del <span style="color:var(--warning)">24/06/2026</span> in direzione MILANO.</div>
                </div>
                <div class="detour-section">
                    <div style="font-size:1rem; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px;">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">
                <span>BOLLETTINO LIVE</span>
                <span id="sync-status" style="font-size: 0.8rem; opacity: 0.7;">CONNESSIONE...</span>
            </div>
            <div id="feed" class="feed-container">
                <div id="initial-loader" class="status-msg">ATTENDERE RICEZIONE DATI...</div>
            </div>
        </div>
    </main>

    <div class="footer-logo">
        <img src="logo CCISS.png" alt="CCISS" onerror="this.style.visibility='hidden'">
    </div>

    <script>
        const CSV_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv';
        let firstLoadDone = false;

        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', options);
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            document.body.classList.toggle('light-mode', now.getHours() >= 8 && now.getHours() < 18);
        }
        setInterval(updateClock, 1000); updateClock();

        function parseCSV(text) {
            const rows = []; let row = []; let col = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else if (char !== '\r') { col += char; }
            }
            if (row.length > 0 || col !== "") { row.push(col); rows.push(row); }
            return rows;
        }

        async function fetchWithRetry() {
            const syncStatus = document.getElementById('sync-status');
            const proxies = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?"];

            for (let proxy of proxies) {
                try {
                    const url = proxy + encodeURIComponent(CSV_LINK + '&t=' + Date.now());
                    const response = await fetch(url);
                    if (!response.ok) continue;
                    const data = await response.text();
                    const rows = parseCSV(data);
                    renderData(rows);
                    syncStatus.textContent = "LIVE - OK: " + new Date().toLocaleTimeString();
                    firstLoadDone = true;
                    return; 
                } catch (e) { console.log("Proxy bypass..."); }
            }
            if (!firstLoadDone) {
                document.getElementById('feed').innerHTML = '<div class="status-msg" style="color:red;">ERRORE DI CONNESSIONE</div>';
            }
        }

        function renderData(rows) {
            const container = document.getElementById('feed');
            let html = "";
            let count = 0;

            rows.forEach(cols => {
                if (cols[0] && cols[0].trim().length > 1) {
                    const title = cols[0].trim();
                    const news = cols[2] ? cols[2].trim() : "";
                    html += `
                        <div class="feed-item">
                            <div class="item-title">${title.toUpperCase()}</div>
                            <div class="item-desc">${news}</div>
                        </div>`;
                    count++;
                }
            });

            if (count > 0) {
                container.innerHTML = html;
            } else if (!firstLoadDone) {
                container.innerHTML = '<div class="status-msg">✅ NESSUN EVENTO RILEVATO</div>';
            }
        }

        function startAutoScroll() {
            const container = document.getElementById('feed');
            setInterval(() => {
                if (!document.getElementById('initial-loader') && container.scrollHeight > container.clientHeight) {
                    container.scrollTop += 1;
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 1) {
                        setTimeout(() => { container.scrollTop = 0; }, 4000); 
                    }
                }
            }, 50);
        }

        fetchWithRetry();
        setInterval(fetchWithRetry, 60000);
        startAutoScroll();
    </script>
</body>
</html>
