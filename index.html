<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MONITORAGGIO VIABILITÀ</title>
    <style>
        :root {
            --bg-main: #0a0f18; --bg-card: #161e2e; --border: #2d3748;
            --text-bright: #f8fafc; --text-dim: #94a3b8;
            --danger: #e11d48; --warning: #fbbf24; --success: #4ade80;
            --header-dark: #1e293b; --header-red: #450a0a;
        }
        body.light-mode {
            --bg-main: #f1f5f9; --bg-card: #ffffff; --border: #cbd5e1;
            --text-bright: #0f172a; --text-dim: #475569;
            --header-dark: #e2e8f0; --header-red: #fee2e2;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-main); color: var(--text-bright);
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 25px;
            height: 100vh; display: grid; grid-template-rows: 90px 1fr; gap: 25px; overflow: hidden;
        }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 3px solid var(--border); padding-bottom: 10px; }
        .clock { font-size: 3.8rem; font-weight: 700; font-family: monospace; }
        main { display: grid; grid-template-columns: 480px 1fr; gap: 25px; height: 100%; padding-bottom: 80px; }
        .panel { background: var(--bg-card); border: 2px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 20px 25px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 4px solid var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); border-bottom: 4px solid var(--warning); }
        .fixed-alert { padding: 35px; border-left: 12px solid var(--danger); }
        .fixed-alert .title { color: var(--danger); font-size: 1.7rem; font-weight: 800; margin-bottom: 25px; }
        .fixed-alert .body-text { font-size: 1.4rem; line-height: 1.5; font-weight: bold; }
        .highlight { color: var(--warning); font-weight: 900; }
        .detour { margin-top: auto; background: rgba(0,0,0,0.05); padding: 30px; border-top: 2px solid var(--border); }
        .detour div { font-size: 2.8rem; font-weight: 900; color: var(--warning); margin-top: 10px; }
        .feed-container { padding: 0 30px; overflow-y: auto; flex-grow: 1; }
        .feed-item { padding: 25px 0; border-bottom: 1px solid var(--border); }
        .item-title { color: var(--warning); font-weight: 800; font-size: 1.5rem; margin-bottom: 12px; text-transform: uppercase; }
        .item-desc { font-size: 1.4rem; line-height: 1.5; color: var(--text-bright); font-weight: 500; }
        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; padding: 40px; color: var(--success); font-size: 2.2rem; font-weight: 800; text-align: center; }
        .footer-logo { position: absolute; bottom: 25px; right: 25px; }
        .footer-logo img { max-height: 65px; width: auto; }
    </style>
</head>
<body>

    <header>
        <h1 style="font-size: 1.4rem; color: var(--text-dim); margin:0;">INFO VIABILITÀ</h1>
        <div id="clock" class="clock">00:00:00</div>
        <div style="text-align: right;"><img src="logo.png" style="max-height: 75px;" onerror="this.style.display='none'"></div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-alert">
                <div class="title">A8 GALLARATE - ENTRATA CHIUSA</div>
                <div class="body-text">Entrata chiusa dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> in direzione Milano.</div>
            </div>
            <div class="detour"><span>Consigliata verso Milano</span><div>Busto Arsizio</div></div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">
                <span>Area VA / Legnano / A8 / A36</span>
                <span id="sync-status" style="font-size: 0.8rem; font-weight: normal; opacity: 0.6;">Avvio sistema...</span>
            </div>
            <div id="feed" class="feed-container">
                <div id="main-status" class="status-msg">CONNESSIONE A GOOGLE SHEETS...</div>
            </div>
        </div>
    </main>

    <div class="footer-logo"><img src="logo CCISS.png" onerror="this.style.display='none'"></div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv';

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            document.body.classList.toggle('light-mode', now.getHours() >= 8 && now.getHours() < 18);
        }
        setInterval(updateClock, 1000); updateClock();

        // FILTRO RICHIESTO
        const keywords = ["varese", "legnano", "a8", "a36", "gallarate", "busto"];

        async function fetchFromSheets() {
            const container = document.getElementById('feed');
            const syncStatus = document.getElementById('sync-status');
            const mainStatus = document.getElementById('main-status');
            
            try {
                const response = await fetch(SHEET_CSV_URL + '&nocache=' + new Date().getTime());
                if (!response.ok) throw new Error("HTTP " + response.status);
                
                const csvData = await response.text();
                if (!csvData || csvData.length < 10) throw new Error("File CSV vuoto");

                const lines = csvData.split(/\r?\n/);
                let htmlContent = "";
                let found = 0;

                for (let i = 0; i < lines.length; i++) {
                    // Parser semplificato: divide per virgola ma gestisce le virgolette
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 3) {
                        const title = cols[0].replace(/"/g, "").trim();
                        const desc = cols[2].replace(/"/g, "").trim();
                        const full = (title + " " + desc).toLowerCase();

                        const match = keywords.some(k => full.includes(k)) || /\bva\b/i.test(full);

                        if (match) {
                            htmlContent += `
                                <div class="feed-item">
                                    <div class="item-title">${title.toUpperCase()}</div>
                                    <div class="item-desc">${desc}</div>
                                </div>`;
                            found++;
                        }
                    }
                }

                if (found > 0) {
                    container.innerHTML = htmlContent;
                } else {
                    container.innerHTML = '<div class="status-msg">Nessuna criticità rilevata su Varese, Legnano, A8 e A36</div>';
                }
                syncStatus.textContent = "AGGIORNATO: " + new Date().toLocaleTimeString();

            } catch (e) {
                console.error(e);
                syncStatus.textContent = "ERRORE DI RETE";
                mainStatus.innerHTML = "ERRORE CARICAMENTO DATI<br><small style='font-size:1rem; color:red;'>" + e.message + "</small>";
            }
        }

        fetchFromSheets();
        setInterval(fetchFromSheets, 60000); // Controlla ogni minuto
    </script>
</body>
</html>
