<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Info traffico e chiusure stradali</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --bg-dark: #020205;
            --panel-bg: rgba(20, 20, 30, 0.8);
            --danger-neon: #ff003c;
            --warning-gold: #f2ff00;
            --info-cyan: #00f2ff;
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            color: #e0e0e0;
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 25px;
            height: 100vh;
            display: grid;
            grid-template-rows: 100px 1fr;
            gap: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* HEADER STILE MILITARE */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--info-cyan);
            padding: 0 40px;
            background: var(--panel-bg);
            box-shadow: var(--border-glow);
        }

        .main-title { 
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2rem; 
            color: var(--info-cyan); 
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .clock { 
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem; 
            color: var(--warning-gold);
            text-shadow: 0 0 10px rgba(242, 255, 0, 0.3);
        }

        /* GRIGLIA PRINCIPALE */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: 100%;
        }

        /* PANEL STYLE */
        .panel {
            background: var(--panel-bg);
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 10px;
            padding: 30px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* BLOCCO GALLARATE (URGENTE) */
        .critical-panel {
            border: 4px solid var(--danger-neon);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.2);
            background: linear-gradient(135deg, #1a0005 0%, #050505 100%);
        }

        .alert-label {
            position: absolute;
            top: -20px;
            left: 30px;
            background: var(--danger-neon);
            color: white;
            padding: 5px 20px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            border-radius: 5px;
        }

        .alert-content {
            font-size: 2.8rem;
            line-height: 1.3;
            margin-top: 20px;
        }

        .highlight { color: var(--warning-gold); font-weight: bold; }
        .destination { 
            font-size: 5rem; 
            color: var(--warning-gold); 
            display: block; 
            text-align: center;
            margin-top: 30px;
            text-shadow: 0 0 20px rgba(242, 255, 0, 0.4);
        }

        /* LISTA DINAMICA */
        .dynamic-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 15px solid var(--info-cyan);
            padding: 20px;
            font-size: 1.8rem;
            transition: all 0.3s;
        }

        .event-card.emergency {
            border-left-color: var(--danger-neon);
            background: rgba(255, 0, 60, 0.1);
        }

        .event-card strong { color: var(--info-cyan); display: block; margin-bottom: 10px; font-size: 2rem; }

        /* SCROLLBAR CUSTOM */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--info-cyan); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="main-title">Info traffico e chiusure stradali</div>
        <div id="clock" class="clock">00:00:00</div>
    </header>

    <div class="content-grid">
        <div class="panel critical-panel">
            <div class="alert-label">ALLERTA CANTIERE A8</div>
            <div class="alert-content">
                <span style="color:var(--danger-neon)">⚠️ A8 GALLARATE - ENTRATA CHIUSA</span><br><br>
                Chiusura: <span class="highlight">23/02/2026 (21:00)</span><br>
                Fine prevista: <span class="highlight">24/06/2026 (05:00)</span><br><br>
                Direzione: MILANO (Lavori)<br>
                <small style="font-size: 1.5rem; opacity: 0.7;">Entrata consigliata:</small>
                <span class="destination">BUSTO ARSIZIO</span>
            </div>
        </div>

        <div class="panel">
            <div class="alert-label" style="background: var(--info-cyan); color: black;">LIVE FEED PROV. VARESE</div>
            <div id="traffic-feed" class="dynamic-list">
                <div class="event-card">Ricerca eventi in corso sulla rete A8 / A36...</div>
            </div>
        </div>
    </div>

    <script>
        // OROLOGIO
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // FILTRI E RECUPERO DATI
        const keywords = ["Varese", "A8", "Gallarate", "Busto", "Castellanza", "Legnano", "Saronno", "A36", "Pedemontana", "Malpensa", "Gazzada", "Besnate", "Vergiate"];

        async function getTraffic() {
            const feedContainer = document.getElementById('traffic-feed');
            
            // Usiamo il feed RSS ufficiale convertito in JSON tramite proxy per evitare errori di connessione
            const rssUrl = "https://www.autostrade.it/autostrade-gis/rss.do?tronco=A8";
            const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(rssUrl);

            try {
                const response = await fetch(proxy);
                const json = await response.json();
                
                // Parsing del file XML ricevuto dal proxy
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(json.contents, "text/xml");
                const items = xmlDoc.getElementsByTagName("item");

                feedContainer.innerHTML = "";
                let count = 0;

                for (let i = 0; i < items.length; i++) {
                    const title = items[i].getElementsByTagName("title")[0].textContent;
                    const desc = items[i].getElementsByTagName("description")[0].textContent;
                    const fullText = (title + " " + desc).toLowerCase();

                    // Filtra solo per zona Varese/A8
                    if (keywords.some(k => fullText.includes(k.toLowerCase())) && count < 5) {
                        const isEmerg = fullText.includes("chiuso") || fullText.includes("incidente") || fullText.includes("coda");
                        
                        const div = document.createElement('div');
                        div.className = `event-card ${isEmerg ? 'emergency' : ''}`;
                        div.innerHTML = `<strong>${title.toUpperCase()}</strong>${desc}`;
                        feedContainer.appendChild(div);
                        count++;
                    }
                }

                if (count === 0) {
                    feedContainer.innerHTML = '<div class="event-card" style="border-left-color: #00ff00;"><strong>SITUAZIONE REGOLARE</strong>Nessuna criticità rilevata su A8 e Pedemontana nell\'area di Varese.</div>';
                }

            } catch (e) {
                feedContainer.innerHTML = '<div class="event-card emergency"><strong>ERRORE CONNESSIONE</strong>Impossibile recuperare i dati in tempo reale. Verificare connessione internet.</div>';
            }
        }

        getTraffic();
        setInterval(getTraffic, 300000); // Aggiorna ogni 5 minuti
    </script>
</body>
</html>
