<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MONITORAGGIO VIABILITÀ</title>
    <style>
        :root {
            /* TEMA DARK (NOTTE) */
            --bg-main: #0a0f18; --bg-card: #161e2e; --border: #2d3748;
            --text-bright: #f8fafc; --text-dim: #94a3b8;
            --danger: #e11d48; --warning: #fbbf24; --success: #4ade80;
            --header-dark: #1e293b; --header-red: #450a0a;
        }
        body.light-mode {
            /* TEMA LIGHT (GIORNO) - OTTIMIZZATO */
            --bg-main: #f8fafc; --bg-card: #ffffff; --border: #cbd5e1;
            --text-bright: #0f172a; --text-dim: #475569;
            --header-dark: #e2e8f0; --header-red: #fee2e2;
            --warning: #b45309; 
            --success: #15803d;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-main); color: var(--text-bright);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 25px;
            height: 100vh; display: grid; grid-template-rows: 110px 1fr; gap: 20px; overflow: hidden;
            transition: background 0.4s;
        }

        /* HEADER */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 3px solid var(--border);
            padding-bottom: 10px;
        }
        .header-center {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-center h1 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0;
        }
        .header-center .separator { font-size: 2.5rem; color: var(--border); font-weight: 300; }
        .header-center img { max-height: 75px; width: auto; }

        /* DATA E OROLOGIO */
        .datetime-container {
            justify-self: end;
            text-align: right;
            display: flex;
            flex-direction: column;
            min-width: 320px;
        }
        #date-box {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: -5px;
        }
        #clock {
            font-size: 3.8rem;
            font-weight: 900;
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
            color: var(--warning);
            line-height: 1;
        }

        /* LAYOUT PRINCIPALE */
        main {
            display: grid;
            grid-template-columns: 500px 1fr;
            gap: 25px;
            height: 100%;
            padding-bottom: 90px;
        }
        .panel {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .panel-header {
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }
        .header-permanente { background: var(--header-red); color: var(--danger); border-bottom: 4px solid var(--danger); }
        .header-bollettino { background: var(--header-dark); color: var(--warning); border-bottom: 4px solid var(--warning); }

        /* SINISTRA: FISSO */
        .fixed-content { padding: 30px; flex-grow: 1; }
        .alert-box { border-left: 10px solid var(--danger); padding-left: 20px; margin-bottom: 40px; }
        .alert-box .title { color: var(--danger); font-size: 1.8rem; font-weight: 900; margin-bottom: 15px; }
        .alert-box .body-text { font-size: 1.4rem; line-height: 1.4; font-weight: 600; }
        .highlight { color: var(--warning); }

        .detour-section { background: rgba(0, 0, 0, 0.05); padding: 25px; border-radius: 8px; border: 1px solid var(--border); }
        .detour-label { font-size: 1rem; text-transform: uppercase; color: var(--text-dim); font-weight: 700; margin-bottom: 5px; }
        .detour-value { font-size: 2.6rem; font-weight: 900; color: var(--warning); line-height: 1; }

        /* DESTRA: FEED */
        .feed-container { padding: 20px 25px; overflow-y: auto; }
        .feed-item { 
            background: rgba(0, 0, 0, 0.02); 
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        body.light-mode .feed-item { background: #fcfcfc; }
        
        /* Stile per notizie persistenti (in coda) */
        .feed-item.persistent { opacity: 0.7; border-style: dashed; }
        .persistent-tag { 
            position: absolute; top: 10px; right: 10px; 
            font-size: 0.7rem; font-weight: bold; color: var(--text-dim); 
            text-transform: uppercase;
        }

        .item-title { color: var(--warning); font-weight: 800; font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        .item-desc { font-size: 1.4rem; line-height: 1.5; color: var(--text-bright); }

        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 2.2rem; font-weight: 800; color: var(--success); text-align: center; }

        .footer-logo { position: absolute; bottom: 25px; right: 30px; z-index: 100; }
        .footer-logo img { max-height: 65px; width: auto; }
    </style>
</head>
<body>

    <header>
        <div></div>
        <div class="header-center">
            <h1>Info Viabilità</h1>
            <span class="separator">|</span>
            <img src="logo.png" alt="Logo Sede" onerror="this.style.visibility='hidden'">
        </div>
        <div class="datetime-container">
            <div id="date-box">-</div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header header-permanente">Segnalazione Permanente</div>
            <div class="fixed-content">
                <div class="alert-box">
                    <div class="title">A8 GALLARATE</div>
                    <div class="body-text">
                        ENTRATA CHIUSA dalle ore <span class="highlight">21:00</span> del <span class="highlight">23/02/2026</span> 
                        alle ore <span class="highlight">05:00</span> del <span class="highlight">24/06/2026</span> 
                        in direzione MILANO per lavori.
                    </div>
                </div>
                <div class="detour-section">
                    <div class="detour-label">Entrata consigliata verso Milano:</div>
                    <div class="detour-value">BUSTO ARSIZIO</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header header-bollettino">
                <span>PROVINCIA DI VARESE | A8 | A36 | LEGNANO</span>
                <span id="sync-status" style="font-size: 0.8rem; font-weight: normal; opacity: 0.6;">-</span>
            </div>
            <div id="feed" class="feed-container">
                <div class="status-msg">RECUPERO DATI...</div>
            </div>
        </div>
    </main>

    <div class="footer-logo">
        <img src="logo CCISS.png" alt="Logo CCISS" onerror="this.style.visibility='hidden'">
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQD7mYVjhrw9Ma3t_av071IGSDcaLoyojD55ZoOc-LuMIkT5OHWKwS93LQhVJCOGVHBJsG9Kyd2sXK/pub?output=csv';
        const PROXY = "https://corsproxy.io/?";
        const MEMORY_TIME = 3 * 60 * 60 * 1000; // 3 ore in millisecondi

        function updateClock() {
            const now = new Date();
            const optionsDate = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-box').textContent = now.toLocaleDateString('it-IT', optionsDate);
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            
            const hour = now.getHours();
            document.body.classList.toggle('light-mode', hour >= 8 && hour < 18);
        }
        setInterval(updateClock, 1000); updateClock();

        const keywords = ["varese", "legnano", "a8", "a36", "gallarate", "busto"];

        function parseCSV(text) {
            const rows = []; let row = []; let col = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i]; let nextChar = text[i+1];
                if (char === '"' && inQuotes && nextChar === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else if (char === '\r' && !inQuotes) { }
                else { col += char; }
            }
            if (row.length > 0 || col !== "") { row.push(col); rows.push(row); }
            return rows;
        }

        // --- NUOVA LOGICA DI MEMORIA ---
        async function fetchFromSheets() {
            const container = document.getElementById('feed');
            const syncStatus = document.getElementById('sync-status');
            const oraAttuale = Date.now();

            try {
                const response = await fetch(PROXY + encodeURIComponent(CSV_URL + '&t=' + oraAttuale));
                const csvData = await response.text();
                const rows = parseCSV(csvData);
                
                // Carica memoria precedente
                let memoria = JSON.parse(localStorage.getItem('traffico_memoria') || '{}');
                let seguitiInQuestoFetch = new Set();

                rows.forEach(cols => {
                    if (cols.length >= 3) {
                        const title = cols[0].trim();
                        const desc = cols[2].trim();
                        const full = (title + " " + desc).toLowerCase();
                        const match = keywords.some(k => full.includes(k)) || /\bva\b/i.test(full);
                        
                        if (match) {
                            const id = title + desc; // ID univoco basato sul contenuto
                            memoria[id] = {
                                title: title,
                                desc: desc,
                                lastSeen: oraAttuale,
                                attivo: true
                            };
                            seguitiInQuestoFetch.add(id);
                        }
                    }
                });

                // Gestione scadenza e stato
                let htmlAttivi = "";
                let htmlPersistenti = "";
                let nuoviDatiMemoria = {};

                for (let id in memoria) {
                    const item = memoria[id];
                    const tempoTrascorso = oraAttuale - item.lastSeen;

                    if (tempoTrascorso < MEMORY_TIME) {
                        const isAncoraInCSV = seguitiInQuestoFetch.has(id);
                        
                        if (isAncoraInCSV) {
                            htmlAttivi += `<div class="feed-item"><div class="item-title">${item.title.toUpperCase()}</div><div class="item-desc">${item.desc}</div></div>`;
                        } else {
                            htmlPersistenti += `<div class="feed-item persistent"><div class="persistent-tag">Segnalazione Precedente</div><div class="item-title">${item.title.toUpperCase()}</div><div class="item-desc">${item.desc}</div></div>`;
                        }
                        
                        // Mantieni nella memoria per il prossimo ciclo
                        nuoviDatiMemoria[id] = item;
                    }
                }

                localStorage.setItem('traffico_memoria', JSON.stringify(nuoviDatiMemoria));
                
                const totaleHTML = htmlAttivi + htmlPersistenti;
                container.innerHTML = totaleHTML !== "" ? totaleHTML : '<div class="status-msg">NESSUNA CRITICITÀ RILEVATA</div>';
                syncStatus.textContent = "LIVE - " + new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});

            } catch (e) { 
                console.error(e);
                syncStatus.textContent = "ERRORE CONNESSIONE"; 
            }
        }

        fetchFromSheets();
        setInterval(fetchFromSheets, 60000);
    </script>
</body>
</html>
